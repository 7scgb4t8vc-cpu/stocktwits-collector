{% extends "base.html" %}
{% block content %}

<div class="page-header">
  <h1>Charts</h1>
  <p class="page-subtitle">Price history, sentiment, and social posts for a single stock</p>
</div>

<div class="filter-bar">
  <select id="symbol-select" class="filter-select">
    <option value="">Select a symbol…</option>
  </select>
</div>

<div id="charts-empty" class="empty">Select a symbol above to view its charts.</div>

<div id="charts-grid" style="display:none">

  <!-- TradingView Chart -->
  <div class="chart-card" style="margin-bottom:1rem;">
    <div class="chart-card-title">Price Chart</div>
    <div id="tv-chart-wrap"></div>
  </div>

  <!-- Sentiment + Volume -->
  <div class="charts-two-col">
    <div class="chart-card">
      <div class="chart-card-title">Message Volume Over Time</div>
      <canvas id="volume-chart" height="200"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-card-title">Sentiment Breakdown Over Time</div>
      <canvas id="sentiment-chart" height="200"></canvas>
    </div>
  </div>

  <!-- Social Feed -->
  <div class="chart-card" style="margin-top:1rem;">
    <div class="chart-card-title">Recent Social Posts</div>
    <div id="charts-social-feed"></div>
  </div>

</div>

<style>
.chart-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem;
}
.chart-card-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 0.75rem;
}
.charts-two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin-bottom: 1rem;
}
@media (max-width: 768px) {
  .charts-two-col { grid-template-columns: 1fr; }
}

/* Social feed */
.charts-feed {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  max-height: 400px;
  overflow-y: auto;
}
.charts-post {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0.6rem 0.875rem;
  border-left: 2px solid var(--border);
}
.charts-post.bullish { border-left-color: var(--green); }
.charts-post.bearish { border-left-color: var(--red); }
.charts-post.neutral { border-left-color: var(--muted); }
.charts-post.mixed   { border-left-color: var(--yellow); }
.charts-post-header {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 4px;
}
.charts-post-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: capitalize;
}
.charts-post-label.bullish { color: var(--green); }
.charts-post-label.bearish { color: var(--red); }
.charts-post-label.neutral { color: var(--muted); }
.charts-post-label.mixed   { color: var(--yellow); }
.charts-post-time { font-size: 10px; color: var(--muted); margin-left: auto; }
.charts-post-text { font-size: 12px; color: var(--text); line-height: 1.5; }
.charts-no-posts { font-size: 13px; color: var(--muted); padding: 1rem 0; }
  .eng-badge {
  font-size: 10px;
  font-weight: 600;
  color: var(--yellow);
  background: rgba(210,153,34,0.1);
  border: 1px solid rgba(210,153,34,0.2);
  border-radius: 20px;
  padding: 2px 8px;
}
</style>

{% endblock %}

{% block scripts %}
<script>
let _charts = {};
let _currentSymbol = "";

const chartDefaults = {
  plugins: { legend: { labels: { color: "#8b949e" } } },
  scales: {
    x: { ticks: { color: "#8b949e", maxTicksLimit: 8 }, grid: { color: "rgba(255,255,255,0.05)" } },
    y: { ticks: { color: "#8b949e" }, grid: { color: "rgba(255,255,255,0.05)" } },
  }
};

function destroyCharts() {
  Object.values(_charts).forEach(c => { try { c.destroy(); } catch(e) {} });
  _charts = {};
}

async function loadSymbolList() {
  const res = await fetch("/api/symbols");
  const symbols = await res.json();
  const sel = document.getElementById("symbol-select");
  const current = sel.value;
  sel.innerHTML = '<option value="">Select a symbol…</option>' +
    symbols.map(s => `<option value="${s}">${s}</option>`).join("");
  if (current) sel.value = current;
}

function renderTradingView(symbol) {
  const wrap = document.getElementById("tv-chart-wrap");
  wrap.innerHTML = `<iframe
    src="https://s.tradingview.com/widgetembed/?symbol=${symbol}&interval=D&theme=dark&style=1&locale=en&hide_top_toolbar=0&hide_legend=0&hide_side_toolbar=0&allow_symbol_change=0&save_image=0&calendar=0&show_popup_button=0&width=100%25&height=400"
    style="width:100%;height:400px;border:none;border-radius:6px;"
    allowtransparency="true"
    scrolling="no"
  ></iframe>`;
}

function escapeHtml(text) {
  return String(text)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

async function loadSocialFeed(symbol) {
  const feed = document.getElementById("charts-social-feed");
  feed.innerHTML = '<div class="loading">Loading posts...</div>';
  try {
    const res  = await fetch(`/api/social?symbol=${symbol}`);
    const rows = await res.json();
    if (!rows.length) {
      feed.innerHTML = '<div class="charts-no-posts">No posts found for this symbol.</div>';
      return;
    }

    const sorted = [...rows].sort((a, b) => {
      const aEng = (a.likes || 0) + (a.reshares || 0);
      const bEng = (b.likes || 0) + (b.reshares || 0);
      return bEng - aEng;
    });

    feed.innerHTML = `<div class="charts-feed">` + sorted.slice(0, 30).map(p => {
      const lbl        = (p.nlp_label || "neutral").toLowerCase();
      const likes      = p.likes || 0;
      const reshares   = p.reshares || 0;
      const engagement = likes + reshares;
      const engHtml    = engagement > 0
        ? `<span class="eng-badge">🔥 ${engagement}${likes > 0 ? ` · ${likes} likes` : ""}${reshares > 0 ? ` · ${reshares} reshares` : ""}</span>`
        : "";
      return `<div class="charts-post ${lbl}">
        <div class="charts-post-header">
          <span class="charts-post-label ${lbl}">${lbl}</span>
          ${engHtml}
          <span class="charts-post-time">${p.timestamp || ""}</span>
        </div>
        <div class="charts-post-text">${escapeHtml(p.message || "")}</div>
      </div>`;
    }).join("") + `</div>`;

  } catch(e) {
    feed.innerHTML = '<div class="error">Failed to load posts.</div>';
  }
}

async function loadSymbolCharts(symbol) {
  if (!symbol) {
    document.getElementById("charts-empty").style.display = "block";
    document.getElementById("charts-grid").style.display = "none";
    destroyCharts();
    return;
  }

  document.getElementById("charts-empty").style.display = "none";
  document.getElementById("charts-grid").style.display = "block";
  destroyCharts();

  renderTradingView(symbol);
  loadSocialFeed(symbol);

  try {
    const res  = await fetch(`/api/charts/${symbol}`);
    const data = await res.json();

    // Message volume over time
    const volLabels = data.volume_series.map(v => v.timestamp);
    const volCounts = data.volume_series.map(v => v.count);
    _charts.volume = new Chart(document.getElementById("volume-chart"), {
      type: "bar",
      data: {
        labels: volLabels,
        datasets: [{ label: "Messages", data: volCounts, backgroundColor: "#3fb950" }]
      },
      options: { ...chartDefaults, plugins: { legend: { display: false } } }
    });

    // Sentiment breakdown over time
    const sentLabels = data.sentiment_series.map(s => s.timestamp);
    _charts.sentiment = new Chart(document.getElementById("sentiment-chart"), {
      type: "bar",
      data: {
        labels: sentLabels,
        datasets: [
          { label: "Bullish", data: data.sentiment_series.map(s => s.bullish), backgroundColor: "#3fb950" },
          { label: "Bearish", data: data.sentiment_series.map(s => s.bearish), backgroundColor: "#f85149" },
          { label: "Neutral", data: data.sentiment_series.map(s => s.neutral), backgroundColor: "#8b949e" },
          { label: "Mixed",   data: data.sentiment_series.map(s => s.mixed),   backgroundColor: "#d29922" },
        ]
      },
      options: {
        ...chartDefaults,
        scales: {
          x: { ...chartDefaults.scales.x, stacked: true },
          y: { ...chartDefaults.scales.y, stacked: true },
        }
      }
    });

  } catch(e) {
    console.error("Charts load error:", e);
  }
}

async function loadCharts() {
  await loadSymbolList();
  const params = new URLSearchParams(window.location.search);
  const sym = params.get("symbol");
  if (sym) {
    _currentSymbol = sym.toUpperCase();
    document.getElementById("symbol-select").value = _currentSymbol;
  }
  if (_currentSymbol) await loadSymbolCharts(_currentSymbol);
}

document.getElementById("symbol-select").addEventListener("change", (e) => {
  _currentSymbol = e.target.value;
  loadSymbolCharts(_currentSymbol);
});

window.registerPageLoader(loadCharts);
</script>
{% endblock %}

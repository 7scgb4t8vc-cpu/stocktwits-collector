{% extends "base.html" %}
{% block content %}

<div class="page-header">
  <h1>Dashboard</h1>
  <p class="page-subtitle">Overview of StockTwits sentiment and market activity</p>
  <div style="margin-top:0.75rem;display:flex;align-items:center;gap:0.75rem">
    <button class="btn-refresh" id="btn-trigger" onclick="triggerRefresh()">⚡ Fetch Fresh Data</button>
    <span id="trigger-status" style="font-size:13px;color:var(--muted)"></span>
  </div>
</div>

<div class="stats-bar" id="stats-bar">
  <div class="stat-chip"><span id="stat-total">—</span> messages</div>
  <div class="stat-chip bullish-chip"><span id="stat-bullish">—</span> bullish</div>
  <div class="stat-chip bearish-chip"><span id="stat-bearish">—</span> bearish</div>
  <div class="stat-chip neutral-chip"><span id="stat-neutral">—</span> neutral</div>
</div>

<div class="dashboard-grid">

  <div class="dash-section">
    <h2 class="section-title">🔥 Top Mentioned Symbols</h2>
    <div id="frequency-list" class="loading">Loading...</div>
  </div>

  <div class="dash-section">
    <h2 class="section-title">⚡ Top Momentum</h2>
    <div id="momentum-list" class="loading">Loading...</div>
  </div>

  <div class="dash-section dash-section--wide">
    <h2 class="section-title">💬 Latest Messages</h2>
    <div id="feed" class="loading">Loading...</div>
  </div>

</div>

{% endblock %}

{% block scripts %}
<script>
async function loadDashboard() {
  const [socialRes, freqRes, momRes] = await Promise.all([
    fetch("/api/social"),
    fetch("/api/frequency"),
    fetch("/api/momentum"),
  ]);

  const social = await socialRes.json();
  const freq   = await freqRes.json();
  const mom    = await momRes.json();

  let bullish = 0, bearish = 0, neutral = 0;
  social.forEach(r => {
    const l = (r.nlp_label || r.sentiment || "").toLowerCase();
    if (l === "bullish") bullish++;
    else if (l === "bearish") bearish++;
    else neutral++;
  });
  document.getElementById("stat-total").textContent   = social.length;
  document.getElementById("stat-bullish").textContent = bullish;
  document.getElementById("stat-bearish").textContent = bearish;
  document.getElementById("stat-neutral").textContent = neutral;

  const freqEl = document.getElementById("frequency-list");
  if (!freq.length) {
    freqEl.innerHTML = '<div class="empty">No data.</div>';
  } else {
    freqEl.innerHTML = freq.slice(0, 10).map(r => `
  <div class="dash-row">
    <span class="ticker-badge">${r.symbol}</span>
    <span class="dash-bar-wrap">
      <span class="dash-bar" style="width:${Math.min(100, (r.mention_count / freq[0].mention_count) * 100)}%"></span>
    </span>
    <span class="dash-count">${r.mention_count}</span>
  </div>`).join("");
  }

  const momEl = document.getElementById("momentum-list");
  if (!mom.length) {
    momEl.innerHTML = '<div class="empty">No data.</div>';
  } else {
    momEl.innerHTML = mom.slice(0, 10).map(r => {
      const chg    = parseFloat(r.change_pct) || 0;
      const chgCls = chg >= 0 ? "bullish" : "bearish";
      const sign   = chg >= 0 ? "+" : "";
      return `
      <div class="dash-row">
        <span class="ticker-badge">${r.ticker || r.symbol || ""}</span>
        <span class="dash-label">${r.company || ""}</span>
        <span class="sentiment-badge badge-${chgCls}">${sign}${chg.toFixed(2)}%</span>
        <span class="dash-meta">Vol ${r.rel_volume || "—"}x</span>
      </div>`;
    }).join("");
  }

  const feedEl = document.getElementById("feed");
  if (!social.length) {
    feedEl.innerHTML = '<div class="empty">No messages.</div>';
  } else {
    feedEl.innerHTML = social.slice(0, 10).map(r => {
      const label = r.nlp_label || r.sentiment || "none";
      return `
        <div class="feed-card sentiment-${label.toLowerCase()}">
          <div class="card-header">
            <span class="ticker-badge">${r.symbol}</span>
            <span class="sentiment-badge badge-${label.toLowerCase()}">${label}</span>
            <span class="card-time">${r.timestamp}</span>
          </div>
          <p class="card-message">${escapeHtml(r.message)}</p>
        </div>`;
    }).join("");
  }
}

async function triggerRefresh() {
  const btn    = document.getElementById("btn-trigger");
  const status = document.getElementById("trigger-status");
  btn.disabled = true;
  status.textContent = "Triggering workflow...";
  try {
    const res  = await fetch("/api/trigger-refresh", { method: "POST" });
    const data = await res.json();
    if (data.status === "triggered") {
      status.textContent = "✅ Running! Data updates in ~30s.";
      setTimeout(() => loadDashboard(), 35000);
    } else {
      status.textContent = "❌ Failed: " + data.error;
    }
  } catch (e) {
    status.textContent = "❌ Error triggering workflow.";
  }
  setTimeout(() => { btn.disabled = false; status.textContent = ""; }, 40000);
}

function escapeHtml(t) {
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

window.registerPageLoader(loadDashboard);
</script>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StockTwits Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<nav class="navbar">
  <div class="nav-brand">
    <span class="brand-icon">📈</span>
    <span class="brand-name">StockTwits Dashboard</span>
  </div>
  <div class="nav-links">
    <a href="/social"   class="nav-link {% if page == 'social'   %}active{% endif %}">Social Feed</a>
    <a href="/screener" class="nav-link {% if page == 'screener' %}active{% endif %}">Screener</a>
    <a href="/charts"   class="nav-link {% if page == 'charts'   %}active{% endif %}">Charts</a>
    <a href="/momentum" class="nav-link {% if page == 'momentum' %}active{% endif %}">Momentum</a>
  </div>
  <div class="nav-refresh">
    <span class="refresh-dot" id="refresh-dot"></span>
    <select id="global-interval" class="nav-interval-select" title="Auto-refresh interval">
      <option value="3600">Hourly</option>
      <option value="86400">Daily</option>
      <option value="604800">Weekly</option>
      <option value="2592000">Monthly</option>
      <option value="31536000">Yearly</option>
    </select>
    <span class="refresh-label" id="refresh-countdown">—</span>
  </div>
</nav>
<main class="main-content">
  {% block content %}{% endblock %}
</main>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>

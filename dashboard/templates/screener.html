{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/screener_news.css') }}">
<div class="page-header">
  <h1>Market Screener</h1>
  <p class="page-subtitle">FinViz metrics with StockTwits sentiment</p>
</div>

<!-- Top Bar -->
<div class="scr-top-bar">
  <div class="scr-filter-group">
    <label class="scr-filter-label">SIGNAL</label>
    <select id="filter-signal" class="filter-select">
      <option value="">None</option>
      <option value="bullish">Social Bullish</option>
      <option value="bearish">Social Bearish</option>
      <option value="unusual">Unusual Volume</option>
    </select>
  </div>
  <div class="scr-filter-group">
    <label class="scr-filter-label">ORDER</label>
    <select id="filter-order" class="filter-select">
      <option value="">Default</option>
      <option value="symbol">Ticker</option>
      <option value="price">Price</option>
      <option value="change">Change %</option>
      <option value="volume">Volume</option>
      <option value="relative_volume">Rel Vol</option>
      <option value="market_cap">Market Cap</option>
      <option value="sentiment_score">Sentiment Score</option>
    </select>
    <button id="order-dir-btn" class="btn-refresh" onclick="toggleOrderDir()">↑</button>
  </div>
  <input type="text" id="filter-symbol" placeholder="Search symbol…" class="filter-input" style="flex:1;" />
  <button class="btn-refresh" onclick="loadScreener()">↻</button>
</div>

<!-- Collapsible Filter Panel -->
<div class="scr-panel-wrap">
  <button class="scr-toggle-btn" onclick="toggleFilters()">▸ Filters</button>
  <div class="scr-panel" id="scr-panel" style="display:none;">
    <div class="scr-tabs">
      <button class="scr-tab active" data-tab="descriptive" onclick="switchTab('descriptive')">Descriptive</button>
      <button class="scr-tab" data-tab="fundamental" onclick="switchTab('fundamental')">Fundamental</button>
      <button class="scr-tab" data-tab="technical" onclick="switchTab('technical')">Technical</button>
      <button class="scr-tab" data-tab="all" onclick="switchTab('all')">All</button>
    </div>
    <div class="scr-panel-grid" id="scr-panel-grid">

      <div class="scr-field cat-descriptive">
        <label class="scr-filter-label">SECTOR</label>
        <select id="f-sector" class="filter-select">
          <option value="">All</option>
        </select>
      </div>
      <div class="scr-field cat-descriptive">
        <label class="scr-filter-label">INDUSTRY</label>
        <select id="f-industry" class="filter-select">
          <option value="">All</option>
        </select>
      </div>
      <div class="scr-field cat-descriptive">
        <label class="scr-filter-label">COUNTRY</label>
        <select id="f-country" class="filter-select">
          <option value="">All</option>
        </select>
      </div>

      <div class="scr-field cat-descriptive">
        <label class="scr-filter-label">MARKET CAP</label>
        <select id="f-mktcap" class="filter-select">
          <option value="">All</option>
          <option value="small">Small (&lt;$2B)</option>
          <option value="mid">Mid ($2B–$10B)</option>
          <option value="large">Large (&gt;$10B)</option>
        </select>
      </div>
      <div class="scr-field cat-descriptive">
        <label class="scr-filter-label">PRICE RANGE</label>
        <select id="f-price" class="filter-select">
          <option value="">Any</option>
          <option value="5">Under $5</option>
          <option value="10">Under $10</option>
          <option value="20">Under $20</option>
          <option value="50">Under $50</option>
          <option value="100">Under $100</option>
        </select>
      </div>
      <div class="scr-field cat-technical">
        <label class="scr-filter-label">PRICE CHANGE</label>
        <select id="f-change" class="filter-select">
          <option value="">Any</option>
          <option value="gainers">Gainers</option>
          <option value="losers">Losers</option>
          <option value="5">+5% or more</option>
          <option value="10">+10% or more</option>
          <option value="-5">-5% or more</option>
          <option value="-10">-10% or more</option>
        </select>
      </div>
      <div class="scr-field cat-descriptive">
        <label class="scr-filter-label">AVG VOLUME</label>
        <select id="f-avgvol" class="filter-select">
          <option value="">Any</option>
          <option value="100000">100K+</option>
          <option value="500000">500K+</option>
          <option value="1000000">1M+</option>
          <option value="5000000">5M+</option>
        </select>
      </div>
      <div class="scr-field cat-descriptive">
        <label class="scr-filter-label">REL VOLUME</label>
        <select id="f-relvol" class="filter-select">
          <option value="">Any</option>
          <option value="1.5">1.5x+</option>
          <option value="2">2x+</option>
          <option value="3">3x+</option>
          <option value="5">5x+</option>
        </select>
      </div>

      <div class="scr-field cat-fundamental">
        <label class="scr-filter-label">P/E</label>
        <select id="f-pe" class="filter-select">
          <option value="">Any</option>
          <option value="profitable">Profitable (P/E &gt; 0)</option>
          <option value="unprofitable">Unprofitable (no P/E)</option>
          <option value="low">Low (&lt;15)</option>
          <option value="mid">Mid (15–25)</option>
          <option value="high">High (&gt;25)</option>
        </select>
      </div>
      <div class="scr-field cat-descriptive">
        <label class="scr-filter-label">DIVIDEND YIELD</label>
        <select id="f-divyield" class="filter-select">
          <option value="">Any</option>
          <option value="none">None</option>
          <option value="1">1%+</option>
          <option value="2">2%+</option>
          <option value="4">4%+</option>
        </select>
      </div>
      <div class="scr-field cat-descriptive">
        <label class="scr-filter-label">SHORT FLOAT</label>
        <select id="f-shortfloat" class="filter-select">
          <option value="">Any</option>
          <option value="5">5%+</option>
          <option value="10">10%+</option>
          <option value="20">20%+</option>
        </select>
      </div>
      <div class="scr-field cat-technical">
        <label class="scr-filter-label">RSI (14)</label>
        <select id="f-rsi" class="filter-select">
          <option value="">Any</option>
          <option value="overbought">Overbought (&gt;70)</option>
          <option value="oversold">Oversold (&lt;30)</option>
        </select>
      </div>
      <div class="scr-field cat-technical">
        <label class="scr-filter-label">PERFORMANCE (MONTH)</label>
        <select id="f-perfmonth" class="filter-select">
          <option value="">Any</option>
          <option value="up">Positive</option>
          <option value="down">Negative</option>
          <option value="10">+10% or more</option>
          <option value="-10">-10% or more</option>
        </select>
      </div>

      <div class="scr-field cat-descriptive">
        <label class="scr-filter-label">INDEX</label>
        <select id="f-index" class="filter-select">
          <option value="">Any</option>
        </select>
      </div>
      <div class="scr-field cat-descriptive">
        <label class="scr-filter-label">ANALYST RECOM</label>
        <select id="f-analyst" class="filter-select">
          <option value="">Any</option>
          <option value="strongbuy">Strong Buy (&le;1.5)</option>
          <option value="buy">Buy (1.5–2.5)</option>
          <option value="hold">Hold (2.5–3.5)</option>
          <option value="sell">Sell (&gt;3.5)</option>
        </select>
      </div>
      <div class="scr-field cat-descriptive">
        <label class="scr-filter-label">OPTIONABLE</label>
        <select id="f-optionable" class="filter-select">
          <option value="">Any</option>
          <option value="Yes">Yes</option>
          <option value="No">No</option>
        </select>
      </div>
      <div class="scr-field cat-descriptive">
        <label class="scr-filter-label">SHORTABLE</label>
        <select id="f-shortable" class="filter-select">
          <option value="">Any</option>
          <option value="Yes">Yes</option>
          <option value="No">No</option>
        </select>
      </div>
      <div class="scr-field cat-descriptive">
        <label class="scr-filter-label">SHARES OUTSTANDING</label>
        <select id="f-sharesout" class="filter-select">
          <option value="">Any</option>
          <option value="50">Under 50M</option>
          <option value="200">50M–200M</option>
          <option value="1000">200M–1B</option>
          <option value="over1000">Over 1B</option>
        </select>
      </div>
      <div class="scr-field cat-descriptive">
        <label class="scr-filter-label">FLOAT %</label>
        <select id="f-float" class="filter-select">
          <option value="">Any</option>
          <option value="low">Low (&lt;20%)</option>
          <option value="mid">Mid (20–50%)</option>
          <option value="high">High (&gt;50%)</option>
        </select>
      </div>
      <div class="scr-field cat-descriptive">
        <label class="scr-filter-label">IPO DATE</label>
        <select id="f-ipo" class="filter-select">
          <option value="">Any</option>
          <option value="2">Last 2 Years</option>
          <option value="5">Last 5 Years</option>
          <option value="established">Established (&gt;5 Years)</option>
        </select>
      </div>
      <div class="scr-field cat-descriptive">
        <label class="scr-filter-label">TARGET PRICE</label>
        <select id="f-target" class="filter-select">
          <option value="">Any</option>
          <option value="above">Above Price (Upside)</option>
          <option value="below">Below Price (Downside)</option>
        </select>
      </div>

      <div class="scr-field cat-fundamental">
        <label class="scr-filter-label">FORWARD P/E</label>
        <select id="f-fpe" class="filter-select">
          <option value="">Any</option>
          <option value="low">Low (&lt;15)</option>
          <option value="mid">Mid (15–25)</option>
          <option value="high">High (&gt;25)</option>
        </select>
      </div>
      <div class="scr-field cat-fundamental">
        <label class="scr-filter-label">PEG</label>
        <select id="f-peg" class="filter-select">
          <option value="">Any</option>
          <option value="low">Low (&lt;1)</option>
          <option value="high">High (&gt;1)</option>
        </select>
      </div>
      <div class="scr-field cat-fundamental">
        <label class="scr-filter-label">P/S</label>
        <select id="f-ps" class="filter-select">
          <option value="">Any</option>
          <option value="low">Low (&lt;2)</option>
          <option value="mid">Mid (2–5)</option>
          <option value="high">High (&gt;5)</option>
        </select>
      </div>
      <div class="scr-field cat-fundamental">
        <label class="scr-filter-label">P/B</label>
        <select id="f-pb" class="filter-select">
          <option value="">Any</option>
          <option value="low">Low (&lt;1)</option>
          <option value="mid">Mid (1–3)</option>
          <option value="high">High (&gt;3)</option>
        </select>
      </div>
      <div class="scr-field cat-fundamental">
        <label class="scr-filter-label">EPS GROWTH THIS YEAR</label>
        <select id="f-epsty" class="filter-select">
          <option value="">Any</option>
          <option value="pos">Positive</option>
          <option value="20">Over 20%</option>
          <option value="neg">Negative</option>
        </select>
      </div>
      <div class="scr-field cat-fundamental">
        <label class="scr-filter-label">EPS GROWTH NEXT YEAR</label>
        <select id="f-epsny" class="filter-select">
          <option value="">Any</option>
          <option value="pos">Positive</option>
          <option value="20">Over 20%</option>
          <option value="neg">Negative</option>
        </select>
      </div>
      <div class="scr-field cat-fundamental">
        <label class="scr-filter-label">ROE</label>
        <select id="f-roe" class="filter-select">
          <option value="">Any</option>
          <option value="pos">Positive</option>
          <option value="20">Over 20%</option>
          <option value="neg">Negative</option>
        </select>
      </div>
      <div class="scr-field cat-fundamental">
        <label class="scr-filter-label">ROA</label>
        <select id="f-roa" class="filter-select">
          <option value="">Any</option>
          <option value="pos">Positive</option>
          <option value="10">Over 10%</option>
          <option value="neg">Negative</option>
        </select>
      </div>
      <div class="scr-field cat-fundamental">
        <label class="scr-filter-label">DEBT/EQUITY</label>
        <select id="f-de" class="filter-select">
          <option value="">Any</option>
          <option value="low">Low (&lt;0.3)</option>
          <option value="high">High (&gt;1)</option>
        </select>
      </div>
      <div class="scr-field cat-fundamental">
        <label class="scr-filter-label">GROSS MARGIN</label>
        <select id="f-gm" class="filter-select">
          <option value="">Any</option>
          <option value="pos">Positive</option>
          <option value="50">Over 50%</option>
          <option value="neg">Negative</option>
        </select>
      </div>
      <div class="scr-field cat-fundamental">
        <label class="scr-filter-label">OPERATING MARGIN</label>
        <select id="f-om" class="filter-select">
          <option value="">Any</option>
          <option value="pos">Positive</option>
          <option value="20">Over 20%</option>
          <option value="neg">Negative</option>
        </select>
      </div>
      <div class="scr-field cat-fundamental">
        <label class="scr-filter-label">NET MARGIN</label>
        <select id="f-nm" class="filter-select">
          <option value="">Any</option>
          <option value="pos">Positive</option>
          <option value="20">Over 20%</option>
          <option value="neg">Negative</option>
        </select>
      </div>
      <div class="scr-field cat-fundamental">
        <label class="scr-filter-label">INSIDER OWNERSHIP</label>
        <select id="f-insown" class="filter-select">
          <option value="">Any</option>
          <option value="10">Over 10%</option>
          <option value="30">Over 30%</option>
        </select>
      </div>
      <div class="scr-field cat-fundamental">
        <label class="scr-filter-label">INSTITUTIONAL OWNERSHIP</label>
        <select id="f-instown" class="filter-select">
          <option value="">Any</option>
          <option value="50">Over 50%</option>
          <option value="90">Over 90%</option>
        </select>
      </div>

      <div class="scr-field cat-technical">
        <label class="scr-filter-label">SMA20</label>
        <select id="f-sma20" class="filter-select">
          <option value="">Any</option>
          <option value="above">Price Above SMA20</option>
          <option value="below">Price Below SMA20</option>
        </select>
      </div>
      <div class="scr-field cat-technical">
        <label class="scr-filter-label">SMA50</label>
        <select id="f-sma50" class="filter-select">
          <option value="">Any</option>
          <option value="above">Price Above SMA50</option>
          <option value="below">Price Below SMA50</option>
        </select>
      </div>
      <div class="scr-field cat-technical">
        <label class="scr-filter-label">SMA200</label>
        <select id="f-sma200" class="filter-select">
          <option value="">Any</option>
          <option value="above">Price Above SMA200</option>
          <option value="below">Price Below SMA200</option>
        </select>
      </div>
      <div class="scr-field cat-technical">
        <label class="scr-filter-label">52-WEEK RANGE</label>
        <select id="f-52wk" class="filter-select">
          <option value="">Any</option>
          <option value="near_high">Near 52W High (&lt;10%)</option>
          <option value="near_low">Near 52W Low (&lt;10%)</option>
        </select>
      </div>
      <div class="scr-field cat-technical">
        <label class="scr-filter-label">PERFORMANCE (WEEK)</label>
        <select id="f-perfweek" class="filter-select">
          <option value="">Any</option>
          <option value="up">Positive</option>
          <option value="down">Negative</option>
        </select>
      </div>
      <div class="scr-field cat-technical">
        <label class="scr-filter-label">PERFORMANCE (YTD)</label>
        <select id="f-perfytd" class="filter-select">
          <option value="">Any</option>
          <option value="up">Positive</option>
          <option value="down">Negative</option>
        </select>
      </div>
    </div>

    <div class="scr-social-heading">Social Sentiment (always shown, not part of FinViz tabs)</div>
    <div class="scr-panel-grid">
      <div class="scr-field cat-social">
        <label class="scr-filter-label">SOCIAL SENTIMENT</label>
        <select id="f-sentiment" class="filter-select">
          <option value="">All</option>
          <option value="bullish">Bullish</option>
          <option value="bearish">Bearish</option>
          <option value="strongbull">Strong Bull (&gt;0.5)</option>
          <option value="strongbear">Strong Bear (&lt;-0.5)</option>
        </select>
      </div>
      <div class="scr-field cat-social">
        <label class="scr-filter-label">MIN POSTS</label>
        <select id="f-posts" class="filter-select">
          <option value="">Any</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="25">25+</option>
          <option value="50">50+</option>
        </select>
      </div>
      <div class="scr-field cat-social">
        <label class="scr-filter-label">SCORE RANGE</label>
        <select id="f-score-range" class="filter-select">
          <option value="">Any</option>
          <option value="strongbull">Strong Bull (&gt;+0.5)</option>
          <option value="bull">Bullish (&gt;+0.1)</option>
          <option value="neutral">Neutral (-0.1 to +0.1)</option>
          <option value="bear">Bearish (&lt;-0.1)</option>
          <option value="strongbear">Strong Bear (&lt;-0.5)</option>
        </select>
      </div>
      <div class="scr-field cat-social">
        <label class="scr-filter-label">SCORE DIRECTION</label>
        <select id="f-score-dir" class="filter-select">
          <option value="">Any</option>
          <option value="improving">Positive Score</option>
          <option value="declining">Negative Score</option>
        </select>
      </div>
    </div>
    <button class="scr-reset-btn" onclick="resetFilters()">Reset Filters</button>
  </div>
</div>

<!-- Stats Bar -->
<div class="stats-bar">
  <div class="stat-chip"><span id="stat-total">—</span> stocks</div>
  <div class="stat-chip bullish-chip"><span id="stat-bullish">—</span> bullish</div>
  <div class="stat-chip bearish-chip"><span id="stat-bearish">—</span> bearish</div>
</div>

<!-- Column View Switcher -->
<div class="scr-view-tabs">
  <button class="scr-view-tab active" data-view="overview" onclick="switchView('overview')">Overview</button>
  <button class="scr-view-tab" data-view="valuation" onclick="switchView('valuation')">Valuation</button>
  <button class="scr-view-tab" data-view="financial" onclick="switchView('financial')">Financial</button>
  <button class="scr-view-tab" data-view="ownership" onclick="switchView('ownership')">Ownership</button>
  <button class="scr-view-tab" data-view="performance" onclick="switchView('performance')">Performance</button>
  <button class="scr-view-tab" data-view="technical" onclick="switchView('technical')">Technical</button>
  <button class="scr-view-tab" data-view="news" onclick="switchView('news')">News</button>
</div>

<!-- Table -->
<div class="table-wrap">
  <table class="data-table" id="screener-table">
    <thead id="screener-thead"></thead>
    <tbody id="screener-body">
      <tr><td class="loading">Loading...</td></tr>
    </tbody>
  </table>
</div>

{% include "_screener_news.html" %}

<style>
.scr-view-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  margin-bottom: 0.75rem;
}
.scr-view-tab {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--muted);
  padding: 5px 14px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.scr-view-tab:hover { color: var(--text); border-color: var(--accent); }
.scr-view-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.scr-top-bar {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 0.75rem;
}
.scr-filter-group {
  display: flex;
  align-items: center;
  gap: 0.4rem;
}
.scr-filter-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  white-space: nowrap;
}
.scr-panel-wrap {
  margin-bottom: 1rem;
}
.scr-toggle-btn {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--accent);
  padding: 5px 14px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: border-color 0.15s;
  margin-bottom: 0.5rem;
}
.scr-toggle-btn:hover { border-color: var(--accent); }
.scr-panel {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem;
}
.scr-panel-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 1rem;
  margin-bottom: 0.75rem;
}
.scr-field {
  display: flex;
  flex-direction: column;
  gap: 0.35rem;
}
.scr-field .filter-select { width: 100%; }
.scr-tabs {
  display: flex;
  gap: 0.4rem;
  margin-bottom: 1rem;
  border-bottom: 1px solid var(--border);
  padding-bottom: 0.75rem;
}
.scr-tab {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--muted);
  padding: 6px 16px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.scr-tab:hover { color: var(--text); border-color: var(--accent); }
.scr-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.scr-social-heading {
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin: 1rem 0 0.6rem;
  padding-top: 0.75rem;
  border-top: 1px solid var(--border);
}
.scr-reset-btn {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--muted);
  padding: 4px 12px;
  font-size: 12px;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}
.scr-reset-btn:hover { border-color: var(--red); color: var(--red); }
.sortable { cursor: pointer; user-select: none; }
.sortable:hover { color: var(--text); }
.sort-arrow { font-size: 11px; opacity: 0.35; margin-left: 3px; }
th.sort-asc  .sort-arrow::after { content: "↑"; opacity: 1; }
th.sort-desc .sort-arrow::after { content: "↓"; opacity: 1; }
.sent-badge {
  display: inline-block;
  padding: 2px 9px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
}
.sent-bullish { background: rgba(63,185,80,0.15); color: #3fb950; border: 1px solid rgba(63,185,80,0.3); }
.sent-bearish { background: rgba(248,81,73,0.15);  color: #f85149; border: 1px solid rgba(248,81,73,0.3); }
.sent-neutral { background: var(--bg3); color: var(--muted); border: 1px solid var(--border); }
.sent-none    { background: var(--bg3); color: var(--muted); border: 1px solid var(--border); }
.score-pos { color: #3fb950; font-weight: 700; }
.score-neg { color: #f85149; font-weight: 700; }
.score-neu { color: var(--muted); }
.score-bar-wrap { display: flex; align-items: center; gap: 6px; }
.score-bar { width: 40px; height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
.score-bar-fill { height: 100%; border-radius: 2px; }
.watch-btn {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--muted);
  padding: 3px 10px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}
.watch-btn:hover { border-color: var(--accent); color: var(--text); }
.watch-btn.watching { background: var(--accent); color: #fff; border-color: var(--accent); }

</style>
{% endblock %}

{% block scripts %}
<script>
let allRows = [];
let socialCountMap = {};
let sortCol = "";
let sortDir = 1;
let orderDir = 1;
let currentView = "overview";
let currentWatchlist = new Set();
let allSocialRows = [];

// Column definitions: label + formatting type
const COLUMN_DEFS = {
  symbol:                       { label: "Symbol",        type: "ticker" },
  sector:                       { label: "Sector",        type: "text" },
  industry:                     { label: "Industry",      type: "text" },
  country:                      { label: "Country",       type: "text" },
  market_cap:                   { label: "Mkt Cap",       type: "marketcap" },
  price:                        { label: "Price",         type: "price" },
  change:                       { label: "Change %",      type: "pctchange" },
  volume:                       { label: "Volume",        type: "volume" },
  relative_volume:              { label: "Rel Vol",       type: "relvol" },
  average_volume:               { label: "Avg Volume",    type: "volume" },
  p_e:                          { label: "P/E",           type: "ratio" },
  forward_p_e:                  { label: "Fwd P/E",       type: "ratio" },
  peg:                          { label: "PEG",           type: "ratio" },
  p_s:                          { label: "P/S",           type: "ratio" },
  p_b:                          { label: "P/B",           type: "ratio" },
  p_cash:                       { label: "P/Cash",        type: "ratio" },
  p_free_cash_flow:             { label: "P/FCF",         type: "ratio" },
  dividend_yield:                { label: "Div Yield",     type: "pct" },
  payout_ratio:                  { label: "Payout Ratio",  type: "pct" },
  current_ratio:                 { label: "Current Ratio",type: "ratio" },
  quick_ratio:                   { label: "Quick Ratio",  type: "ratio" },
  lt_debt_equity:                { label: "LT Debt/Eq",   type: "ratio" },
  total_debt_equity:             { label: "Debt/Eq",      type: "ratio" },
  gross_margin:                  { label: "Gross Margin", type: "pct" },
  operating_margin:              { label: "Oper Margin",  type: "pct" },
  profit_margin:                  { label: "Net Margin",   type: "pct" },
  shares_outstanding:            { label: "Shares Out",   type: "sharesM" },
  float:                         { label: "Float %",      type: "pct" },
  insider_ownership:              { label: "Insider Own",  type: "pct" },
  insider_transactions:           { label: "Insider Trans",type: "pct" },
  institutional_ownership:        { label: "Inst Own",     type: "pct" },
  institutional_transactions:     { label: "Inst Trans",   type: "pct" },
  short_float:                    { label: "Short Float",  type: "pct" },
  short_ratio:                    { label: "Short Ratio",  type: "ratio" },
  performance_week:               { label: "Perf Week",    type: "pct" },
  performance_month:              { label: "Perf Month",   type: "pct" },
  performance_quarter:            { label: "Perf Qtr",     type: "pct" },
  performance_half_year:          { label: "Perf 6M",      type: "pct" },
  performance_year:               { label: "Perf Year",    type: "pct" },
  performance_ytd:                { label: "Perf YTD",     type: "pct" },
  volatility_week:                { label: "Volatility Wk",type: "pct" },
  volatility_month:               { label: "Volatility Mo",type: "pct" },
  average_true_range:             { label: "ATR",          type: "ratio" },
  relative_strength_index_14:     { label: "RSI (14)",     type: "ratio" },
  "20_day_simple_moving_average": { label: "SMA20",        type: "pct" },
  "50_day_simple_moving_average": { label: "SMA50",        type: "pct" },
  "200_day_simple_moving_average":{ label: "SMA200",       type: "pct" },
  "52_week_high":                 { label: "52W High",     type: "pct" },
  "52_week_low":                  { label: "52W Low",      type: "pct" },
  sentiment:                      { label: "Sentiment",    type: "sentiment" },
  sentiment_score:                { label: "Score",        type: "score" },
  watchlist:                      { label: "Track",        type: "watchlist" },
};

const VIEW_SETS = {
  overview:    ["watchlist","symbol","sector","industry","country","market_cap","p_e","price","change","volume","sentiment","sentiment_score"],
  valuation:   ["watchlist","symbol","p_e","forward_p_e","peg","p_s","p_b","p_cash","p_free_cash_flow","price","change","sentiment","sentiment_score"],
  financial:   ["watchlist","symbol","dividend_yield","payout_ratio","current_ratio","quick_ratio","lt_debt_equity","total_debt_equity","gross_margin","operating_margin","profit_margin","sentiment","sentiment_score"],
  ownership:   ["watchlist","symbol","shares_outstanding","float","insider_ownership","insider_transactions","institutional_ownership","institutional_transactions","short_float","short_ratio","sentiment","sentiment_score"],
  performance: ["watchlist","symbol","performance_week","performance_month","performance_quarter","performance_half_year","performance_year","performance_ytd","volatility_week","volatility_month","sentiment","sentiment_score"],
  technical:   ["watchlist","symbol","relative_strength_index_14","20_day_simple_moving_average","50_day_simple_moving_average","200_day_simple_moving_average","52_week_high","52_week_low","average_true_range","price","change","sentiment","sentiment_score"],
};

function formatVolume(val) {
  const n = parseInt(String(val).replace(/,/g, "")) || 0;
  if (n >= 1_000_000_000) return (n / 1_000_000_000).toFixed(2) + "B";
  if (n >= 1_000_000)     return (n / 1_000_000).toFixed(2) + "M";
  if (n >= 1_000)         return (n / 1_000).toFixed(1) + "K";
  return n.toLocaleString();
}

function formatMarketCap(val) {
  if (!val || val === "—") return "—";
  const s = String(val).trim();
  if (/[BMK]$/i.test(s)) return s;
  const n = parseFloat(s.replace(/,/g, ""));
  if (isNaN(n)) return val;
  if (n >= 1_000_000_000) return (n / 1_000_000_000).toFixed(2) + "B";
  if (n >= 1_000_000)     return (n / 1_000_000).toFixed(2) + "M";
  if (n >= 1_000)         return (n / 1_000).toFixed(1) + "K";
  return s;
}

function parseMarketCapNum(val) {
  if (!val) return 0;
  const s = String(val).trim();
  const n = parseFloat(s);
  if (s.endsWith("B")) return n * 1_000_000_000;
  if (s.endsWith("M")) return n * 1_000_000;
  if (s.endsWith("K")) return n * 1_000;
  return parseFloat(s.replace(/,/g, "")) || 0;
}

function parsePercent(val) {
  if (val === undefined || val === null || val === "") return null;
  const n = parseFloat(String(val).replace(/[%,]/g, ""));
  return isNaN(n) ? null : n;
}

function toggleFilters() {
  const panel = document.getElementById("scr-panel");
  const btn   = document.querySelector(".scr-toggle-btn");
  const open  = panel.style.display === "none";
  panel.style.display = open ? "block" : "none";
  btn.textContent = (open ? "▾" : "▸") + " Filters";
}

function switchTab(tab) {
  document.querySelectorAll(".scr-tab").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.tab === tab);
  });
  document.querySelectorAll("#scr-panel-grid .scr-field").forEach(field => {
    if (tab === "all") {
      field.style.display = "flex";
    } else {
      field.style.display = field.classList.contains("cat-" + tab) ? "flex" : "none";
    }
  });
}

function switchView(view) {
  currentView = view;
  document.querySelectorAll(".scr-view-tab").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.view === view);
  });
  const tableWrap = document.querySelector(".table-wrap");
  const newsCards = document.getElementById("news-cards");
  if (view === "news") {
    tableWrap.style.display = "none";
    newsCards.style.display = "grid";
    document.getElementById("news-interval-bar").style.display = "block";
    renderNewsCards();
  } else {
    tableWrap.style.display = "block";
    newsCards.style.display = "none";
    document.getElementById("news-interval-bar").style.display = "none";
    renderHeader();
    applyFilters();
  }
}


function renderHeader() {
  const cols = VIEW_SETS[currentView];
  const thead = document.getElementById("screener-thead");
  thead.innerHTML = "<tr>" + cols.map(col => {
    const def = COLUMN_DEFS[col];
    const activeClass = sortCol === col ? (sortDir === 1 ? " sort-asc" : " sort-desc") : "";
    return `<th class="sortable${activeClass}" data-col="${col}">${def.label} <span class="sort-arrow">↕</span></th>`;
  }).join("") + "</tr>";
}

function formatCell(row, col) {
  const def = COLUMN_DEFS[col];
  const raw = row[col];
  switch (def.type) {
    case "ticker":
      return `<a class="ticker-link" href="/charts?symbol=${row.symbol}"><strong>${row.symbol}</strong></a>`;
    case "text":
      return raw || "—";
    case "marketcap":
      return formatMarketCap(raw);
    case "price":
      return raw ? "$" + raw : "—";
    case "pctchange": {
      const chg = parseFloat(raw) || 0;
      const cls = chg > 0 ? "positive" : chg < 0 ? "negative" : "";
      const sign = chg > 0 ? "+" : "";
      return `<span class="${cls}">${sign}${chg.toFixed(2)}%</span>`;
    }
    case "volume":
      return formatVolume(raw);
    case "relvol": {
      const rv = parseFloat(raw) || 0;
      return rv > 0 ? rv.toFixed(2) + "x" : "—";
    }
    case "ratio":
      return (raw !== undefined && raw !== null && raw !== "") ? raw : "—";
    case "pct":
      return (raw !== undefined && raw !== null && raw !== "") ? raw : "—";
    case "sharesM":
      return (raw !== undefined && raw !== null && raw !== "") ? raw + "M" : "—";
    case "sentiment": {
      const sent = row.sentiment || "None";
      const sc = row._sc || {};
      const scTip = `Bullish: ${sc.bullish||0}  Bearish: ${sc.bearish||0}  Neutral: ${sc.none||0}`;
      const posts = socialCountMap[row.symbol] || 0;
      return `<span title="${scTip}"><span class="sent-badge sent-${sent.toLowerCase()}">${sent}</span>
        <span style="font-size:10px;color:var(--muted);margin-left:4px;">${posts} posts</span></span>`;
    }
    case "score":
      return formatScore(row.sentiment_score);
    case "watchlist": {
      const tracked = currentWatchlist.has(row.symbol);
      return `<button class="watch-btn${tracked ? " watching" : ""}" onclick="toggleWatchlist('${row.symbol}', ${tracked})">${tracked ? "★ Tracking" : "☆ Add"}</button>`;
    }
    default:
      return raw || "—";
  }
}

function toggleOrderDir() {
  orderDir *= -1;
  document.getElementById("order-dir-btn").textContent = orderDir === 1 ? "↑" : "↓";
  applyFilters();
}

function resetFilters() {
  ["f-sector","f-industry","f-country","f-mktcap","f-price","f-change","f-avgvol","f-relvol",
   "f-pe","f-divyield","f-shortfloat","f-rsi","f-perfmonth",
   "f-index","f-analyst","f-optionable","f-shortable","f-sharesout","f-float","f-ipo","f-target",
   "f-fpe","f-peg","f-ps","f-pb","f-epsty","f-epsny","f-roe","f-roa","f-de","f-gm","f-om","f-nm",
   "f-insown","f-instown","f-sma20","f-sma50","f-sma200","f-52wk","f-perfweek","f-perfytd",
   "f-sentiment","f-posts","f-score-range","f-score-dir"].forEach(id => {
    document.getElementById(id).value = "";
  });
  document.getElementById("filter-signal").value = "";
  document.getElementById("filter-symbol").value = "";
  document.getElementById("filter-order").value  = "";
  applyFilters();
}

function populateDropdown(id, values) {
  const sel = document.getElementById(id);
  const current = sel.value;
  const opts = ['<option value="">All</option>'];
  values.forEach(v => opts.push(`<option value="${v}">${v}</option>`));
  sel.innerHTML = opts.join("");
  sel.value = current;
}

async function loadScreener() {
  try {
    const [screenerRes, socialRes, scoreRes, symbolsRes] = await Promise.all([
      fetch("/api/screener"),
      fetch("/api/social"),
      fetch("/api/sentiment-scores"),
      fetch("/api/symbols"),
    ]);
    const screenerRows = await screenerRes.json();
    const socialRows   = await socialRes.json();
    const scoreMap     = await scoreRes.json();
    currentWatchlist   = new Set(await symbolsRes.json());
    allSocialRows = socialRows;

    const sentMap = {};
    socialCountMap = {};
    for (const msg of socialRows) {
      const sym   = msg.symbol;
      const label = (msg.nlp_label || msg.sentiment || "none").toLowerCase();
      if (!sentMap[sym]) sentMap[sym] = { bullish: 0, bearish: 0, none: 0 };
      if (label === "bullish") sentMap[sym].bullish++;
      else if (label === "bearish") sentMap[sym].bearish++;
      else sentMap[sym].none++;
      socialCountMap[sym] = (socialCountMap[sym] || 0) + 1;
    }

    allRows = screenerRows.map(r => {
      const sc = sentMap[r.symbol] || { bullish: 0, bearish: 0, none: 0 };
      const scoreRow = scoreMap[r.symbol];
      const sentiment_score = scoreRow ? parseFloat(scoreRow.agg_sentiment) : null;
      let dominant = "Neutral";
      if (sentiment_score !== null && !isNaN(sentiment_score)) {
        if (sentiment_score > 0.05) dominant = "Bullish";
        else if (sentiment_score < -0.05) dominant = "Bearish";
      }
      return { ...r, sentiment: dominant, sentiment_score, _sc: sc };
    });

    // Populate dropdowns dynamically from whatever FinViz actually returned
    populateDropdown("f-sector",   [...new Set(allRows.map(r => r.sector).filter(Boolean))].sort());
    populateDropdown("f-industry", [...new Set(allRows.map(r => r.industry).filter(Boolean))].sort());
    populateDropdown("f-country",  [...new Set(allRows.map(r => r.country).filter(Boolean))].sort());
    const indexSet = new Set();
    allRows.forEach(r => (r.index || "").split(",").map(s => s.trim()).filter(Boolean).forEach(v => indexSet.add(v)));
    populateDropdown("f-index", [...indexSet].sort());

    applyFilters();

  } catch (e) {
    document.getElementById("screener-body").innerHTML =
      `<tr><td colspan="${VIEW_SETS[currentView].length}" class="error">Failed to load data.</td></tr>`;
  }
}

function applyFilters() {
  if (currentView === "news") {
    renderNewsCards();
    return;
  }

  const sym       = document.getElementById("filter-symbol").value.toUpperCase();
  const signal    = document.getElementById("filter-signal").value;
  const orderCol  = document.getElementById("filter-order").value;
  const sector    = document.getElementById("f-sector").value;
  const industry  = document.getElementById("f-industry").value;
  const country   = document.getElementById("f-country").value;
  const mktcap    = document.getElementById("f-mktcap").value;
  const price     = document.getElementById("f-price").value;
  const change    = document.getElementById("f-change").value;
  const avgvol    = document.getElementById("f-avgvol").value;
  const relvol    = document.getElementById("f-relvol").value;
  const peFilter  = document.getElementById("f-pe").value;
  const divYield  = document.getElementById("f-divyield").value;
  const shortFloat = document.getElementById("f-shortfloat").value;
  const rsiFilter = document.getElementById("f-rsi").value;
  const perfMonth = document.getElementById("f-perfmonth").value;
  const indexFilter   = document.getElementById("f-index").value;
  const analyst       = document.getElementById("f-analyst").value;
  const optionable     = document.getElementById("f-optionable").value;
  const shortable      = document.getElementById("f-shortable").value;
  const sharesOut      = document.getElementById("f-sharesout").value;
  const floatPct       = document.getElementById("f-float").value;
  const ipoFilter      = document.getElementById("f-ipo").value;
  const targetFilter   = document.getElementById("f-target").value;
  const fpeFilter      = document.getElementById("f-fpe").value;
  const pegFilter      = document.getElementById("f-peg").value;
  const psFilter       = document.getElementById("f-ps").value;
  const pbFilter       = document.getElementById("f-pb").value;
  const epsTyFilter    = document.getElementById("f-epsty").value;
  const epsNyFilter    = document.getElementById("f-epsny").value;
  const roeFilter      = document.getElementById("f-roe").value;
  const roaFilter      = document.getElementById("f-roa").value;
  const deFilter       = document.getElementById("f-de").value;
  const gmFilter       = document.getElementById("f-gm").value;
  const omFilter       = document.getElementById("f-om").value;
  const nmFilter       = document.getElementById("f-nm").value;
  const insOwnFilter   = document.getElementById("f-insown").value;
  const instOwnFilter  = document.getElementById("f-instown").value;
  const sma20Filter    = document.getElementById("f-sma20").value;
  const sma50Filter    = document.getElementById("f-sma50").value;
  const sma200Filter   = document.getElementById("f-sma200").value;
  const wk52Filter     = document.getElementById("f-52wk").value;
  const perfWeekFilter = document.getElementById("f-perfweek").value;
  const perfYtdFilter  = document.getElementById("f-perfytd").value;
  const sentiment = document.getElementById("f-sentiment").value;
  const posts     = document.getElementById("f-posts").value;

  let filtered = allRows.filter(r => {
    const chg    = parseFloat(r.change) || 0;
    const pr     = parseFloat(r.price) || 0;
    const rv     = parseFloat(r.relative_volume) || 0;
    const av     = parseInt(String(r.average_volume || "0").replace(/,/g, "")) || 0;
    const mc     = parseMarketCapNum(r.market_cap);
    const pe     = parseFloat(r.p_e);
    const dy     = parsePercent(r.dividend_yield);
    const sf     = parsePercent(r.short_float);
    const rsi    = parseFloat(r.relative_strength_index_14);
    const perfM  = parsePercent(r.performance_month);
    const score  = r.sentiment_score;
    const pcount = socialCountMap[r.symbol] || 0;

    if (sym && !r.symbol.includes(sym)) return false;

    if (sector   && r.sector !== sector)     return false;
    if (industry && r.industry !== industry) return false;
    if (country  && r.country !== country)   return false;

    if (signal === "bullish" && r.sentiment !== "Bullish") return false;
    if (signal === "bearish" && r.sentiment !== "Bearish") return false;
    if (signal === "unusual" && rv < 2) return false;

    if (mktcap === "small"  && mc >= 2_000_000_000)  return false;
    if (mktcap === "mid"    && (mc < 2_000_000_000 || mc > 10_000_000_000)) return false;
    if (mktcap === "large"  && mc <= 10_000_000_000) return false;

    if (price && pr > parseFloat(price)) return false;

    if (change === "gainers" && chg <= 0)  return false;
    if (change === "losers"  && chg >= 0)  return false;
    if (change === "5"       && chg < 5)   return false;
    if (change === "10"      && chg < 10)  return false;
    if (change === "-5"      && chg > -5)  return false;
    if (change === "-10"     && chg > -10) return false;

    if (avgvol && av < parseInt(avgvol)) return false;
    if (relvol && rv < parseFloat(relvol)) return false;

    if (peFilter === "profitable"   && !(pe > 0))          return false;
    if (peFilter === "unprofitable" && !(isNaN(pe) || pe <= 0)) return false;
    if (peFilter === "low"          && !(pe > 0 && pe < 15))  return false;
    if (peFilter === "mid"          && !(pe >= 15 && pe <= 25)) return false;
    if (peFilter === "high"         && !(pe > 25))          return false;

    if (divYield === "none" && !(dy === null || dy === 0)) return false;
    if (divYield === "1"    && !(dy >= 1)) return false;
    if (divYield === "2"    && !(dy >= 2)) return false;
    if (divYield === "4"    && !(dy >= 4)) return false;

    if (shortFloat === "5"  && !(sf >= 5))  return false;
    if (shortFloat === "10" && !(sf >= 10)) return false;
    if (shortFloat === "20" && !(sf >= 20)) return false;

    if (rsiFilter === "overbought" && !(rsi > 70)) return false;
    if (rsiFilter === "oversold"   && !(rsi < 30)) return false;

    if (perfMonth === "up"   && !(perfM > 0))   return false;
    if (perfMonth === "down" && !(perfM < 0))   return false;
    if (perfMonth === "10"   && !(perfM >= 10)) return false;
    if (perfMonth === "-10"  && !(perfM <= -10)) return false;

    if (indexFilter && !((r.index || "").includes(indexFilter))) return false;

    const rec = parseFloat(r.analyst_recom);
    if (analyst === "strongbuy" && !(rec <= 1.5)) return false;
    if (analyst === "buy"       && !(rec > 1.5 && rec <= 2.5)) return false;
    if (analyst === "hold"      && !(rec > 2.5 && rec <= 3.5)) return false;
    if (analyst === "sell"      && !(rec > 3.5)) return false;

    if (optionable && r.optionable !== optionable) return false;
    if (shortable  && r.shortable  !== shortable)  return false;

    const shrOut = parseFloat(r.shares_outstanding); // in millions
    if (sharesOut === "50"       && !(shrOut < 50))                  return false;
    if (sharesOut === "200"      && !(shrOut >= 50 && shrOut < 200)) return false;
    if (sharesOut === "1000"     && !(shrOut >= 200 && shrOut < 1000)) return false;
    if (sharesOut === "over1000" && !(shrOut >= 1000))               return false;

    const fl = parsePercent(r.float);
    if (floatPct === "low"  && !(fl !== null && fl < 20))              return false;
    if (floatPct === "mid"  && !(fl !== null && fl >= 20 && fl <= 50)) return false;
    if (floatPct === "high" && !(fl !== null && fl > 50))              return false;

    if (ipoFilter) {
      if (!r.ipo_date) return false;
      const ipoDt = new Date(r.ipo_date);
      const yearsAgo = (Date.now() - ipoDt.getTime()) / (1000 * 60 * 60 * 24 * 365);
      if (ipoFilter === "2" && !(yearsAgo <= 2)) return false;
      if (ipoFilter === "5" && !(yearsAgo <= 5)) return false;
      if (ipoFilter === "established" && !(yearsAgo > 5)) return false;
    }

    const tgt = parseFloat(r.target_price);
    if (targetFilter === "above" && !(tgt > pr))            return false;
    if (targetFilter === "below" && !(tgt > 0 && tgt < pr)) return false;

    const fpe = parseFloat(r.forward_p_e);
    if (fpeFilter === "low"  && !(fpe > 0 && fpe < 15))  return false;
    if (fpeFilter === "mid"  && !(fpe >= 15 && fpe <= 25)) return false;
    if (fpeFilter === "high" && !(fpe > 25))             return false;

    const pegVal = parseFloat(r.peg);
    if (pegFilter === "low"  && !(pegVal > 0 && pegVal < 1)) return false;
    if (pegFilter === "high" && !(pegVal >= 1))              return false;

    const psVal = parseFloat(r.p_s);
    if (psFilter === "low"  && !(psVal > 0 && psVal < 2))  return false;
    if (psFilter === "mid"  && !(psVal >= 2 && psVal <= 5)) return false;
    if (psFilter === "high" && !(psVal > 5))               return false;

    const pbVal = parseFloat(r.p_b);
    if (pbFilter === "low"  && !(pbVal > 0 && pbVal < 1))  return false;
    if (pbFilter === "mid"  && !(pbVal >= 1 && pbVal <= 3)) return false;
    if (pbFilter === "high" && !(pbVal > 3))               return false;

    const epsTy = parsePercent(r.eps_growth_this_year);
    if (epsTyFilter === "pos" && !(epsTy !== null && epsTy > 0))  return false;
    if (epsTyFilter === "20"  && !(epsTy !== null && epsTy > 20)) return false;
    if (epsTyFilter === "neg" && !(epsTy !== null && epsTy < 0))  return false;

    const epsNy = parsePercent(r.eps_growth_next_year);
    if (epsNyFilter === "pos" && !(epsNy !== null && epsNy > 0))  return false;
    if (epsNyFilter === "20"  && !(epsNy !== null && epsNy > 20)) return false;
    if (epsNyFilter === "neg" && !(epsNy !== null && epsNy < 0))  return false;

    const roe = parsePercent(r.return_on_equity);
    if (roeFilter === "pos" && !(roe !== null && roe > 0))  return false;
    if (roeFilter === "20"  && !(roe !== null && roe > 20)) return false;
    if (roeFilter === "neg" && !(roe !== null && roe < 0))  return false;

    const roa = parsePercent(r.return_on_assets);
    if (roaFilter === "pos" && !(roa !== null && roa > 0))  return false;
    if (roaFilter === "10"  && !(roa !== null && roa > 10)) return false;
    if (roaFilter === "neg" && !(roa !== null && roa < 0))  return false;

    const de = parseFloat(r.total_debt_equity);
    if (deFilter === "low"  && !(de >= 0 && de < 0.3)) return false;
    if (deFilter === "high" && !(de > 1))              return false;

    const gm = parsePercent(r.gross_margin);
    if (gmFilter === "pos" && !(gm !== null && gm > 0))  return false;
    if (gmFilter === "50"  && !(gm !== null && gm > 50)) return false;
    if (gmFilter === "neg" && !(gm !== null && gm < 0))  return false;

    const om = parsePercent(r.operating_margin);
    if (omFilter === "pos" && !(om !== null && om > 0))  return false;
    if (omFilter === "20"  && !(om !== null && om > 20)) return false;
    if (omFilter === "neg" && !(om !== null && om < 0))  return false;

    const nm = parsePercent(r.profit_margin);
    if (nmFilter === "pos" && !(nm !== null && nm > 0))  return false;
    if (nmFilter === "20"  && !(nm !== null && nm > 20)) return false;
    if (nmFilter === "neg" && !(nm !== null && nm < 0))  return false;

    const insOwn = parsePercent(r.insider_ownership);
    if (insOwnFilter === "10" && !(insOwn !== null && insOwn > 10)) return false;
    if (insOwnFilter === "30" && !(insOwn !== null && insOwn > 30)) return false;

    const instOwn = parsePercent(r.institutional_ownership);
    if (instOwnFilter === "50" && !(instOwn !== null && instOwn > 50)) return false;
    if (instOwnFilter === "90" && !(instOwn !== null && instOwn > 90)) return false;

    // SMA fields are stored as "% from SMA" — positive means price is above the average
    const sma20pct  = parsePercent(r["20_day_simple_moving_average"]);
    const sma50pct  = parsePercent(r["50_day_simple_moving_average"]);
    const sma200pct = parsePercent(r["200_day_simple_moving_average"]);
    if (sma20Filter === "above"  && !(sma20pct !== null && sma20pct > 0))  return false;
    if (sma20Filter === "below"  && !(sma20pct !== null && sma20pct < 0))  return false;
    if (sma50Filter === "above"  && !(sma50pct !== null && sma50pct > 0))  return false;
    if (sma50Filter === "below"  && !(sma50pct !== null && sma50pct < 0))  return false;
    if (sma200Filter === "above" && !(sma200pct !== null && sma200pct > 0)) return false;
    if (sma200Filter === "below" && !(sma200pct !== null && sma200pct < 0)) return false;

    // 52-week high/low fields are stored as "% from" — negative means below that mark
    const wk52High = parsePercent(r["52_week_high"]);
    const wk52Low  = parsePercent(r["52_week_low"]);
    if (wk52Filter === "near_high" && !(wk52High !== null && wk52High >= -10)) return false;
    if (wk52Filter === "near_low"  && !(wk52Low  !== null && wk52Low  <= 10))  return false;

    const perfWeek = parsePercent(r.performance_week);
    if (perfWeekFilter === "up"   && !(perfWeek !== null && perfWeek > 0)) return false;
    if (perfWeekFilter === "down" && !(perfWeek !== null && perfWeek < 0)) return false;

    const perfYtd = parsePercent(r.performance_ytd);
    if (perfYtdFilter === "up"   && !(perfYtd !== null && perfYtd > 0)) return false;
    if (perfYtdFilter === "down" && !(perfYtd !== null && perfYtd < 0)) return false;

    if (sentiment === "bullish"    && (score === null || score <= 0.05))  return false;
    if (sentiment === "bearish"    && (score === null || score >= -0.05)) return false;
    if (sentiment === "strongbull" && (score === null || score <= 0.09))  return false;
    if (sentiment === "strongbear" && (score === null || score >= -0.09)) return false;

    const scoreRange = document.getElementById("f-score-range").value;
    const scoreDir   = document.getElementById("f-score-dir").value;
    if (scoreRange === "strongbull" && (score === null || score <= 0.06))           return false;
    if (scoreRange === "bull"       && (score === null || score <= 0.02))           return false;
    if (scoreRange === "neutral"    && (score === null || score < -0.02 || score > 0.02)) return false;
    if (scoreRange === "bear"       && (score === null || score >= -0.02))          return false;
    if (scoreRange === "strongbear" && (score === null || score >= -0.06))          return false;
    if (scoreDir === "improving"    && (score === null || score <= 0))            return false;
    if (scoreDir === "declining"    && (score === null || score >= 0))            return false;

    if (posts && pcount < parseInt(posts)) return false;

    return true;
  });

  if (orderCol) {
    filtered = filtered.sort((a, b) => {
      const av = parseNum(a[orderCol]), bv = parseNum(b[orderCol]);
      if (!isNaN(av) && !isNaN(bv)) return (av - bv) * orderDir;
      return String(a[orderCol] || "").localeCompare(String(b[orderCol] || "")) * orderDir;
    });
  } else if (sortCol) {
    filtered = sortRows(filtered);
  }

  renderTable(filtered);
}

function parseNum(v) {
  return parseFloat(String(v || "").replace(/[%$BMKx,]/gi, "").trim());
}

function sortRows(rows) {
  return [...rows].sort((a, b) => {
    const av = parseNum(a[sortCol]), bv = parseNum(b[sortCol]);
    if (!isNaN(av) && !isNaN(bv)) return (av - bv) * sortDir;
    return String(a[sortCol] || "").localeCompare(String(b[sortCol] || "")) * sortDir;
  });
}

function formatScore(score) {
  if (score === null || score === undefined || isNaN(score)) return '<span class="score-neu">—</span>';
  const cls   = score > 0.1 ? "score-pos" : score < -0.1 ? "score-neg" : "score-neu";
  const sign  = score > 0 ? "+" : "";
  const pct   = Math.min(Math.abs(score) / 0.15, 1) * 100;
  const color = score > 0.1 ? "#3fb950" : score < -0.1 ? "#f85149" : "#8b949e";
  return `<div class="score-bar-wrap">
    <span class="${cls}">${sign}${score.toFixed(2)}</span>
    <div class="score-bar"><div class="score-bar-fill" style="width:${pct}%;background:${color};"></div></div>
  </div>`;
}
async function toggleWatchlist(symbol, isTracked) {
  const url = isTracked ? "/api/watchlist/remove" : "/api/watchlist/add";
  await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ symbol }),
  });
  if (isTracked) currentWatchlist.delete(symbol);
  else currentWatchlist.add(symbol);
  applyFilters();
}
function renderTable(rows) {
  let bull = 0, bear = 0;
  let _activeSymbolsTimer = null;
  rows.forEach(r => {
    if (r.sentiment === "Bullish") bull++;
    else if (r.sentiment === "Bearish") bear++;
  });
  document.getElementById("stat-total").textContent   = rows.length;
  document.getElementById("stat-bullish").textContent = bull;
  document.getElementById("stat-bearish").textContent = bear;
  const cols = VIEW_SETS[currentView];
  const body = document.getElementById("screener-body");
  if (!rows.length) {
    body.innerHTML = `<tr><td colspan="${cols.length}" class="empty">No stocks match your filters.</td></tr>`;
    return;
  }
  body.innerHTML = rows.map(r => {
    return "<tr>" + cols.map(col => `<td>${formatCell(r, col)}</td>`).join("") + "</tr>";
  }).join("");

  const symbols = rows.map(r => r.symbol);
  fetch("/api/watchlist/sync", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ symbols }),
  });

  clearTimeout(_activeSymbolsTimer);
  _activeSymbolsTimer = setTimeout(() => {
    fetch("/api/active-symbols", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ symbols: symbols.slice(0, 50) }),
    });
  }, 2000);
}

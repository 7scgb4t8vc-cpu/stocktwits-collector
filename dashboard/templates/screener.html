{% extends "base.html" %}

{% block content %}
<div class="page-header">
  <h1>Screener</h1>
  <p class="page-subtitle">FinViz metrics with StockTwits sentiment</p>
</div>

<div class="scr-filter-bar">
  <div class="scr-filter-group">
    <label class="scr-filter-label">SYMBOL</label>
    <input type="text" id="filter-symbol" placeholder="Search…" class="filter-input" style="width:100px;" />
  </div>
  <div class="scr-filter-group">
    <label class="scr-filter-label">SIGNAL</label>
    <select id="filter-signal" class="filter-select">
      <option value="">All</option>
      <option value="bullish">Social Bullish</option>
      <option value="bearish">Social Bearish</option>
      <option value="unusual">Unusual Volume</option>
    </select>
  </div>
  <div class="scr-filter-group">
    <label class="scr-filter-label">CHANGE</label>
    <select id="filter-change" class="filter-select">
      <option value="">Any</option>
      <option value="gainers">Gainers</option>
      <option value="losers">Losers</option>
      <option value="5">+5%</option>
      <option value="10">+10%</option>
    </select>
  </div>
  <div class="scr-filter-group">
    <label class="scr-filter-label">PRICE</label>
    <select id="filter-price" class="filter-select">
      <option value="">Any</option>
      <option value="5">Under $5</option>
      <option value="10">Under $10</option>
      <option value="20">Under $20</option>
      <option value="50">Under $50</option>
    </select>
  </div>
  <div class="scr-filter-group">
    <label class="scr-filter-label">SENTIMENT</label>
    <select id="filter-sentiment" class="filter-select">
      <option value="">Any</option>
      <option value="bullish">Bullish</option>
      <option value="bearish">Bearish</option>
      <option value="strongbull">Strong Bull (&gt;0.5)</option>
      <option value="strongbear">Strong Bear (&lt;-0.5)</option>
    </select>
  </div>
  <button class="btn-refresh" onclick="loadScreener()">↻ Refresh</button>
</div>

<div class="stats-bar">
  <div class="stat-chip"><span id="stat-total">—</span> stocks</div>
  <div class="stat-chip bullish-chip"><span id="stat-bullish">—</span> bullish</div>
  <div class="stat-chip bearish-chip"><span id="stat-bearish">—</span> bearish</div>
</div>

<div class="table-wrap">
  <table class="data-table" id="screener-table">
    <thead>
      <tr>
        <th class="sortable" data-col="symbol">Symbol <span class="sort-arrow">↕</span></th>
        <th class="sortable" data-col="price">Price <span class="sort-arrow">↕</span></th>
        <th class="sortable" data-col="change_pct">Change % <span class="sort-arrow">↕</span></th>
        <th class="sortable" data-col="volume">Volume <span class="sort-arrow">↕</span></th>
        <th class="sortable" data-col="rel_volume">Rel Vol <span class="sort-arrow">↕</span></th>
        <th class="sortable" data-col="market_cap">Mkt Cap <span class="sort-arrow">↕</span></th>
        <th class="sortable" data-col="sentiment">Sentiment <span class="sort-arrow">↕</span></th>
        <th class="sortable" data-col="sentiment_score">Score <span class="sort-arrow">↕</span></th>
      </tr>
    </thead>
    <tbody id="screener-body">
      <tr><td colspan="8" class="loading">Loading...</td></tr>
    </tbody>
  </table>
</div>

<style>
.scr-filter-bar {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1rem;
}
.scr-filter-group {
  display: flex;
  align-items: center;
  gap: 0.4rem;
}
.scr-filter-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  white-space: nowrap;
}
.sortable { cursor: pointer; user-select: none; }
.sortable:hover { color: var(--text); }
.sort-arrow { font-size: 11px; opacity: 0.35; margin-left: 3px; }
th.sort-asc  .sort-arrow::after { content: "↑"; opacity: 1; }
th.sort-desc .sort-arrow::after { content: "↓"; opacity: 1; }
.sent-badge {
  display: inline-block;
  padding: 2px 9px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
}
.sent-bullish { background: rgba(63,185,80,0.15); color: #3fb950; border: 1px solid rgba(63,185,80,0.3); }
.sent-bearish { background: rgba(248,81,73,0.15);  color: #f85149; border: 1px solid rgba(248,81,73,0.3); }
.sent-neutral { background: var(--bg3); color: var(--muted); border: 1px solid var(--border); }
.sent-none    { background: var(--bg3); color: var(--muted); border: 1px solid var(--border); }
.score-pos { color: #3fb950; font-weight: 700; }
.score-neg { color: #f85149; font-weight: 700; }
.score-neu { color: var(--muted); }
.score-bar-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
}
.score-bar {
  width: 40px;
  height: 4px;
  background: var(--bg3);
  border-radius: 2px;
  overflow: hidden;
}
.score-bar-fill {
  height: 100%;
  border-radius: 2px;
}
</style>
{% endblock %}

{% block scripts %}
<script>
let allRows = [];
let sortCol = "";
let sortDir = 1;

function formatVolume(val) {
  const n = parseInt(String(val).replace(/,/g, "")) || 0;
  if (n >= 1_000_000_000) return (n / 1_000_000_000).toFixed(2) + "B";
  if (n >= 1_000_000)     return (n / 1_000_000).toFixed(2) + "M";
  if (n >= 1_000)         return (n / 1_000).toFixed(1) + "K";
  return n.toLocaleString();
}

function formatMarketCap(val) {
  if (!val || val === "—") return "—";
  const s = String(val).trim();
  if (/[BMK]$/i.test(s)) return s;
  const n = parseFloat(s.replace(/,/g, ""));
  if (isNaN(n)) return val;
  if (n >= 1_000_000_000) return (n / 1_000_000_000).toFixed(2) + "B";
  if (n >= 1_000_000)     return (n / 1_000_000).toFixed(2) + "M";
  if (n >= 1_000)         return (n / 1_000).toFixed(1) + "K";
  return s;
}

async function loadScreener() {
  try {
    const [screenerRes, socialRes, scoreRes] = await Promise.all([
      fetch("/api/screener"),
      fetch("/api/social"),
      fetch("/api/sentiment-scores"),
    ]);
    const screenerRows = await screenerRes.json();
    const socialRows   = await socialRes.json();
    const scoreMap     = await scoreRes.json();

    const sentMap = {};
    for (const msg of socialRows) {
      const sym   = msg.symbol;
      const label = (msg.nlp_label || msg.sentiment || "none").toLowerCase();
      if (!sentMap[sym]) sentMap[sym] = { bullish: 0, bearish: 0, none: 0 };
      if (label === "bullish") sentMap[sym].bullish++;
      else if (label === "bearish") sentMap[sym].bearish++;
      else sentMap[sym].none++;
    }

    allRows = screenerRows.map(r => {
      const sc = sentMap[r.symbol] || { bullish: 0, bearish: 0, none: 0 };
      let dominant = "None";
      if (sc.bullish > sc.bearish && sc.bullish > sc.none) dominant = "Bullish";
      else if (sc.bearish > sc.bullish && sc.bearish > sc.none) dominant = "Bearish";
      const scoreRow = scoreMap[r.symbol];
      const sentiment_score = scoreRow ? parseFloat(scoreRow.agg_sentiment) : null;
      return { ...r, sentiment: dominant, sentiment_score, _sc: sc };
    });

    applyFilters();

    let bull = 0, bear = 0;
    allRows.forEach(r => {
      if (r.sentiment === "Bullish") bull++;
      else if (r.sentiment === "Bearish") bear++;
    });
    document.getElementById("stat-total").textContent   = allRows.length;
    document.getElementById("stat-bullish").textContent = bull;
    document.getElementById("stat-bearish").textContent = bear;

  } catch (e) {
    document.getElementById("screener-body").innerHTML =
      '<tr><td colspan="8" class="error">Failed to load data.</td></tr>';
  }
}

function applyFilters() {
  const sym      = document.getElementById("filter-symbol").value.toUpperCase();
  const signal   = document.getElementById("filter-signal").value;
  const change   = document.getElementById("filter-change").value;
  const price    = document.getElementById("filter-price").value;
  const sentiment = document.getElementById("filter-sentiment").value;

  let filtered = allRows.filter(r => {
    const chg   = parseFloat(r.change_pct) || 0;
    const pr    = parseFloat(r.price) || 0;
    const rv    = parseFloat(r.rel_volume) || 0;
    const score = r.sentiment_score;

    if (sym && !r.symbol.includes(sym)) return false;

    if (signal === "bullish"  && r.sentiment !== "Bullish") return false;
    if (signal === "bearish"  && r.sentiment !== "Bearish") return false;
    if (signal === "unusual"  && rv < 2) return false;

    if (change === "gainers" && chg <= 0) return false;
    if (change === "losers"  && chg >= 0) return false;
    if (change === "5"       && chg < 5)  return false;
    if (change === "10"      && chg < 10) return false;

    if (price && pr > parseFloat(price)) return false;

    if (sentiment === "bullish"   && (score === null || score <= 0.1))  return false;
    if (sentiment === "bearish"   && (score === null || score >= -0.1)) return false;
    if (sentiment === "strongbull" && (score === null || score <= 0.5)) return false;
    if (sentiment === "strongbear" && (score === null || score >= -0.5)) return false;

    return true;
  });

  if (sortCol) filtered = sortRows(filtered);
  renderTable(filtered);
}

function parseNum(v) {
  return parseFloat(String(v || "").replace(/[%$BMKx,]/gi, "").trim());
}

function sortRows(rows) {
  return [...rows].sort((a, b) => {
    const av = parseNum(a[sortCol]), bv = parseNum(b[sortCol]);
    if (!isNaN(av) && !isNaN(bv)) return (av - bv) * sortDir;
    return String(a[sortCol] || "").localeCompare(String(b[sortCol] || "")) * sortDir;
  });
}

function formatScore(score) {
  if (score === null || score === undefined || isNaN(score)) return '<span class="score-neu">—</span>';
  const cls    = score > 0.1 ? "score-pos" : score < -0.1 ? "score-neg" : "score-neu";
  const sign   = score > 0 ? "+" : "";
  const pct    = Math.min(Math.abs(score), 1) * 100;
  const color  = score > 0.1 ? "#3fb950" : score < -0.1 ? "#f85149" : "#8b949e";
  return `<div class="score-bar-wrap">
    <span class="${cls}">${sign}${score.toFixed(2)}</span>
    <div class="score-bar"><div class="score-bar-fill" style="width:${pct}%;background:${color};"></div></div>
  </div>`;
}

function renderTable(rows) {
  const body = document.getElementById("screener-body");
  if (!rows.length) {
    body.innerHTML = '<tr><td colspan="8" class="empty">No stocks match your filters.</td></tr>';
    return;
  }
  body.innerHTML = rows.map(r => {
    const chg      = parseFloat(r.change_pct) || 0;
    const chgClass = chg > 0 ? "positive" : chg < 0 ? "negative" : "";
    const chgSign  = chg > 0 ? "+" : "";
    const sent     = r.sentiment || "None";
    const rv       = parseFloat(r.rel_volume) || 0;
    const sc       = r._sc || {};
    const scTip    = `Bullish: ${sc.bullish||0}  Bearish: ${sc.bearish||0}  Neutral: ${sc.none||0}`;
    return `<tr>
      <td><a class="ticker-link" href="/charts?symbol=${r.symbol}"><strong>${r.symbol}</strong></a></td>
      <td>$${r.price || "—"}</td>
      <td class="${chgClass}">${chgSign}${chg.toFixed(2)}%</td>
      <td>${formatVolume(r.volume)}</td>
      <td>${rv > 0 ? rv.toFixed(2) + "x" : "—"}</td>
      <td>${formatMarketCap(r.market_cap)}</td>
      <td title="${scTip}">
        <span class="sent-badge sent-${sent.toLowerCase()}">${sent}</span>
      </td>
      <td>${formatScore(r.sentiment_score)}</td>
    </tr>`;
  }).join("");
}

document.querySelectorAll("th.sortable").forEach(th => {
  th.addEventListener("click", () => {
    const col = th.dataset.col;
    if (sortCol === col) {
      sortDir *= -1;
    } else {
      document.querySelectorAll("th.sortable").forEach(t => t.classList.remove("sort-asc", "sort-desc"));
      sortCol = col;
      sortDir = 1;
    }
    th.className = "sortable " + (sortDir === 1 ? "sort-asc" : "sort-desc");
    applyFilters();
  });
});

document.getElementById("filter-symbol").addEventListener("input", applyFilters);
document.getElementById("filter-signal").addEventListener("change", applyFilters);
document.getElementById("filter-change").addEventListener("change", applyFilters);
document.getElementById("filter-price").addEventListener("change", applyFilters);
document.getElementById("filter-sentiment").addEventListener("change", applyFilters);

window.registerPageLoader(loadScreener);
</script>
{% endblock %}

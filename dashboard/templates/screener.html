{% extends "base.html" %}

{% block content %}
<div class="page-header">
  <h1>Market Screener</h1>
  <p class="page-subtitle">FinViz metrics with StockTwits sentiment</p>
</div>

<!-- Top Bar -->
<div class="scr-top-bar">
  <div class="scr-filter-group">
    <label class="scr-filter-label">SIGNAL</label>
    <select id="filter-signal" class="filter-select">
      <option value="">None</option>
      <option value="bullish">Social Bullish</option>
      <option value="bearish">Social Bearish</option>
      <option value="unusual">Unusual Volume</option>
    </select>
  </div>
  <div class="scr-filter-group">
    <label class="scr-filter-label">ORDER</label>
    <select id="filter-order" class="filter-select">
      <option value="">Default</option>
      <option value="symbol">Ticker</option>
      <option value="price">Price</option>
      <option value="change">Change %</option>
      <option value="volume">Volume</option>
      <option value="relative_volume">Rel Vol</option>
      <option value="market_cap">Market Cap</option>
      <option value="sentiment_score">Sentiment Score</option>
    </select>
    <button id="order-dir-btn" class="btn-refresh" onclick="toggleOrderDir()">↑</button>
  </div>
  <input type="text" id="filter-symbol" placeholder="Search symbol…" class="filter-input" style="flex:1;" />
  <button class="btn-refresh" onclick="loadScreener()">↻</button>
</div>

<!-- Collapsible Filter Panel -->
<div class="scr-panel-wrap">
  <button class="scr-toggle-btn" onclick="toggleFilters()">▸ Filters</button>
  <div class="scr-panel" id="scr-panel" style="display:none;">
    <div class="scr-panel-grid">

      <div class="scr-field">
        <label class="scr-filter-label">SECTOR</label>
        <select id="f-sector" class="filter-select">
          <option value="">All</option>
        </select>
      </div>
      <div class="scr-field">
        <label class="scr-filter-label">INDUSTRY</label>
        <select id="f-industry" class="filter-select">
          <option value="">All</option>
        </select>
      </div>
      <div class="scr-field">
        <label class="scr-filter-label">COUNTRY</label>
        <select id="f-country" class="filter-select">
          <option value="">All</option>
        </select>
      </div>

      <div class="scr-field">
        <label class="scr-filter-label">MARKET CAP</label>
        <select id="f-mktcap" class="filter-select">
          <option value="">All</option>
          <option value="small">Small (&lt;$2B)</option>
          <option value="mid">Mid ($2B–$10B)</option>
          <option value="large">Large (&gt;$10B)</option>
        </select>
      </div>
      <div class="scr-field">
        <label class="scr-filter-label">PRICE RANGE</label>
        <select id="f-price" class="filter-select">
          <option value="">Any</option>
          <option value="5">Under $5</option>
          <option value="10">Under $10</option>
          <option value="20">Under $20</option>
          <option value="50">Under $50</option>
          <option value="100">Under $100</option>
        </select>
      </div>
      <div class="scr-field">
        <label class="scr-filter-label">PRICE CHANGE</label>
        <select id="f-change" class="filter-select">
          <option value="">Any</option>
          <option value="gainers">Gainers</option>
          <option value="losers">Losers</option>
          <option value="5">+5% or more</option>
          <option value="10">+10% or more</option>
          <option value="-5">-5% or more</option>
          <option value="-10">-10% or more</option>
        </select>
      </div>
      <div class="scr-field">
        <label class="scr-filter-label">AVG VOLUME</label>
        <select id="f-avgvol" class="filter-select">
          <option value="">Any</option>
          <option value="100000">100K+</option>
          <option value="500000">500K+</option>
          <option value="1000000">1M+</option>
          <option value="5000000">5M+</option>
        </select>
      </div>
      <div class="scr-field">
        <label class="scr-filter-label">REL VOLUME</label>
        <select id="f-relvol" class="filter-select">
          <option value="">Any</option>
          <option value="1.5">1.5x+</option>
          <option value="2">2x+</option>
          <option value="3">3x+</option>
          <option value="5">5x+</option>
        </select>
      </div>

      <div class="scr-field">
        <label class="scr-filter-label">P/E</label>
        <select id="f-pe" class="filter-select">
          <option value="">Any</option>
          <option value="profitable">Profitable (P/E &gt; 0)</option>
          <option value="unprofitable">Unprofitable (no P/E)</option>
          <option value="low">Low (&lt;15)</option>
          <option value="mid">Mid (15–25)</option>
          <option value="high">High (&gt;25)</option>
        </select>
      </div>
      <div class="scr-field">
        <label class="scr-filter-label">DIVIDEND YIELD</label>
        <select id="f-divyield" class="filter-select">
          <option value="">Any</option>
          <option value="none">None</option>
          <option value="1">1%+</option>
          <option value="2">2%+</option>
          <option value="4">4%+</option>
        </select>
      </div>
      <div class="scr-field">
        <label class="scr-filter-label">SHORT FLOAT</label>
        <select id="f-shortfloat" class="filter-select">
          <option value="">Any</option>
          <option value="5">5%+</option>
          <option value="10">10%+</option>
          <option value="20">20%+</option>
        </select>
      </div>
      <div class="scr-field">
        <label class="scr-filter-label">RSI (14)</label>
        <select id="f-rsi" class="filter-select">
          <option value="">Any</option>
          <option value="overbought">Overbought (&gt;70)</option>
          <option value="oversold">Oversold (&lt;30)</option>
        </select>
      </div>
      <div class="scr-field">
        <label class="scr-filter-label">PERFORMANCE (MONTH)</label>
        <select id="f-perfmonth" class="filter-select">
          <option value="">Any</option>
          <option value="up">Positive</option>
          <option value="down">Negative</option>
          <option value="10">+10% or more</option>
          <option value="-10">-10% or more</option>
        </select>
      </div>

      <div class="scr-field">
        <label class="scr-filter-label">SOCIAL SENTIMENT</label>
        <select id="f-sentiment" class="filter-select">
          <option value="">All</option>
          <option value="bullish">Bullish</option>
          <option value="bearish">Bearish</option>
          <option value="strongbull">Strong Bull (&gt;0.5)</option>
          <option value="strongbear">Strong Bear (&lt;-0.5)</option>
        </select>
      </div>
      <div class="scr-field">
        <label class="scr-filter-label">MIN POSTS</label>
        <select id="f-posts" class="filter-select">
          <option value="">Any</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="25">25+</option>
          <option value="50">50+</option>
        </select>
      </div>
      <div class="scr-field">
        <label class="scr-filter-label">SCORE RANGE</label>
        <select id="f-score-range" class="filter-select">
          <option value="">Any</option>
          <option value="strongbull">Strong Bull (&gt;+0.5)</option>
          <option value="bull">Bullish (&gt;+0.1)</option>
          <option value="neutral">Neutral (-0.1 to +0.1)</option>
          <option value="bear">Bearish (&lt;-0.1)</option>
          <option value="strongbear">Strong Bear (&lt;-0.5)</option>
        </select>
      </div>
      <div class="scr-field">
        <label class="scr-filter-label">SCORE DIRECTION</label>
        <select id="f-score-dir" class="filter-select">
          <option value="">Any</option>
          <option value="improving">Positive Score</option>
          <option value="declining">Negative Score</option>
        </select>
      </div>
    </div>
    <button class="scr-reset-btn" onclick="resetFilters()">Reset Filters</button>
  </div>
</div>

<!-- Stats Bar -->
<div class="stats-bar">
  <div class="stat-chip"><span id="stat-total">—</span> stocks</div>
  <div class="stat-chip bullish-chip"><span id="stat-bullish">—</span> bullish</div>
  <div class="stat-chip bearish-chip"><span id="stat-bearish">—</span> bearish</div>
</div>

<!-- Table -->
<div class="table-wrap">
  <table class="data-table" id="screener-table">
    <thead>
      <tr>
        <th class="sortable" data-col="symbol">Symbol <span class="sort-arrow">↕</span></th>
        <th class="sortable" data-col="sector">Sector <span class="sort-arrow">↕</span></th>
        <th class="sortable" data-col="industry">Industry <span class="sort-arrow">↕</span></th>
        <th class="sortable" data-col="price">Price <span class="sort-arrow">↕</span></th>
        <th class="sortable" data-col="change">Change % <span class="sort-arrow">↕</span></th>
        <th class="sortable" data-col="volume">Volume <span class="sort-arrow">↕</span></th>
        <th class="sortable" data-col="relative_volume">Rel Vol <span class="sort-arrow">↕</span></th>
        <th class="sortable" data-col="market_cap">Mkt Cap <span class="sort-arrow">↕</span></th>
        <th class="sortable" data-col="p_e">P/E <span class="sort-arrow">↕</span></th>
        <th class="sortable" data-col="sentiment">Sentiment <span class="sort-arrow">↕</span></th>
        <th class="sortable" data-col="sentiment_score">Score <span class="sort-arrow">↕</span></th>
      </tr>
    </thead>
    <tbody id="screener-body">
      <tr><td colspan="11" class="loading">Loading...</td></tr>
    </tbody>
  </table>
</div>

<style>
.scr-top-bar {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 0.75rem;
}
.scr-filter-group {
  display: flex;
  align-items: center;
  gap: 0.4rem;
}
.scr-filter-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  white-space: nowrap;
}
.scr-panel-wrap {
  margin-bottom: 1rem;
}
.scr-toggle-btn {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--accent);
  padding: 5px 14px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: border-color 0.15s;
  margin-bottom: 0.5rem;
}
.scr-toggle-btn:hover { border-color: var(--accent); }
.scr-panel {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem;
}
.scr-panel-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 1rem;
  margin-bottom: 0.75rem;
}
.scr-field {
  display: flex;
  flex-direction: column;
  gap: 0.35rem;
}
.scr-field .filter-select { width: 100%; }
.scr-reset-btn {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--muted);
  padding: 4px 12px;
  font-size: 12px;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}
.scr-reset-btn:hover { border-color: var(--red); color: var(--red); }
.sortable { cursor: pointer; user-select: none; }
.sortable:hover { color: var(--text); }
.sort-arrow { font-size: 11px; opacity: 0.35; margin-left: 3px; }
th.sort-asc  .sort-arrow::after { content: "↑"; opacity: 1; }
th.sort-desc .sort-arrow::after { content: "↓"; opacity: 1; }
.sent-badge {
  display: inline-block;
  padding: 2px 9px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
}
.sent-bullish { background: rgba(63,185,80,0.15); color: #3fb950; border: 1px solid rgba(63,185,80,0.3); }
.sent-bearish { background: rgba(248,81,73,0.15);  color: #f85149; border: 1px solid rgba(248,81,73,0.3); }
.sent-neutral { background: var(--bg3); color: var(--muted); border: 1px solid var(--border); }
.sent-none    { background: var(--bg3); color: var(--muted); border: 1px solid var(--border); }
.score-pos { color: #3fb950; font-weight: 700; }
.score-neg { color: #f85149; font-weight: 700; }
.score-neu { color: var(--muted); }
.score-bar-wrap { display: flex; align-items: center; gap: 6px; }
.score-bar { width: 40px; height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
.score-bar-fill { height: 100%; border-radius: 2px; }
</style>
{% endblock %}

{% block scripts %}
<script>
let allRows = [];
let socialCountMap = {};
let sortCol = "";
let sortDir = 1;
let orderDir = 1;

function formatVolume(val) {
  const n = parseInt(String(val).replace(/,/g, "")) || 0;
  if (n >= 1_000_000_000) return (n / 1_000_000_000).toFixed(2) + "B";
  if (n >= 1_000_000)     return (n / 1_000_000).toFixed(2) + "M";
  if (n >= 1_000)         return (n / 1_000).toFixed(1) + "K";
  return n.toLocaleString();
}

function formatMarketCap(val) {
  if (!val || val === "—") return "—";
  const s = String(val).trim();
  if (/[BMK]$/i.test(s)) return s;
  const n = parseFloat(s.replace(/,/g, ""));
  if (isNaN(n)) return val;
  if (n >= 1_000_000_000) return (n / 1_000_000_000).toFixed(2) + "B";
  if (n >= 1_000_000)     return (n / 1_000_000).toFixed(2) + "M";
  if (n >= 1_000)         return (n / 1_000).toFixed(1) + "K";
  return s;
}

function parseMarketCapNum(val) {
  if (!val) return 0;
  const s = String(val).trim();
  const n = parseFloat(s);
  if (s.endsWith("B")) return n * 1_000_000_000;
  if (s.endsWith("M")) return n * 1_000_000;
  if (s.endsWith("K")) return n * 1_000;
  return parseFloat(s.replace(/,/g, "")) || 0;
}

function parsePercent(val) {
  if (val === undefined || val === null || val === "") return null;
  const n = parseFloat(String(val).replace(/[%,]/g, ""));
  return isNaN(n) ? null : n;
}

function toggleFilters() {
  const panel = document.getElementById("scr-panel");
  const btn   = document.querySelector(".scr-toggle-btn");
  const open  = panel.style.display === "none";
  panel.style.display = open ? "block" : "none";
  btn.textContent = (open ? "▾" : "▸") + " Filters";
}

function toggleOrderDir() {
  orderDir *= -1;
  document.getElementById("order-dir-btn").textContent = orderDir === 1 ? "↑" : "↓";
  applyFilters();
}

function resetFilters() {
  ["f-sector","f-industry","f-country","f-mktcap","f-price","f-change","f-avgvol","f-relvol",
   "f-pe","f-divyield","f-shortfloat","f-rsi","f-perfmonth",
   "f-sentiment","f-posts","f-score-range","f-score-dir"].forEach(id => {
    document.getElementById(id).value = "";
  });
  document.getElementById("filter-signal").value = "";
  document.getElementById("filter-symbol").value = "";
  document.getElementById("filter-order").value  = "";
  applyFilters();
}

function populateDropdown(id, values) {
  const sel = document.getElementById(id);
  const current = sel.value;
  const opts = ['<option value="">All</option>'];
  values.forEach(v => opts.push(`<option value="${v}">${v}</option>`));
  sel.innerHTML = opts.join("");
  sel.value = current;
}

async function loadScreener() {
  try {
    const [screenerRes, socialRes, scoreRes] = await Promise.all([
      fetch("/api/screener"),
      fetch("/api/social"),
      fetch("/api/sentiment-scores"),
    ]);
    const screenerRows = await screenerRes.json();
    const socialRows   = await socialRes.json();
    const scoreMap     = await scoreRes.json();

    const sentMap = {};
    socialCountMap = {};
    for (const msg of socialRows) {
      const sym   = msg.symbol;
      const label = (msg.nlp_label || msg.sentiment || "none").toLowerCase();
      if (!sentMap[sym]) sentMap[sym] = { bullish: 0, bearish: 0, none: 0 };
      if (label === "bullish") sentMap[sym].bullish++;
      else if (label === "bearish") sentMap[sym].bearish++;
      else sentMap[sym].none++;
      socialCountMap[sym] = (socialCountMap[sym] || 0) + 1;
    }

    allRows = screenerRows.map(r => {
      const sc = sentMap[r.symbol] || { bullish: 0, bearish: 0, none: 0 };
      const scoreRow = scoreMap[r.symbol];
      const sentiment_score = scoreRow ? parseFloat(scoreRow.agg_sentiment) : null;
      let dominant = "Neutral";
      if (sentiment_score !== null && !isNaN(sentiment_score)) {
        if (sentiment_score > 0.05) dominant = "Bullish";
        else if (sentiment_score < -0.05) dominant = "Bearish";
      }
      return { ...r, sentiment: dominant, sentiment_score, _sc: sc };
    });

    // Populate dropdowns dynamically from whatever FinViz actually returned
    populateDropdown("f-sector",   [...new Set(allRows.map(r => r.sector).filter(Boolean))].sort());
    populateDropdown("f-industry", [...new Set(allRows.map(r => r.industry).filter(Boolean))].sort());
    populateDropdown("f-country",  [...new Set(allRows.map(r => r.country).filter(Boolean))].sort());

    applyFilters();

    let bull = 0, bear = 0;
    allRows.forEach(r => {
      if (r.sentiment === "Bullish") bull++;
      else if (r.sentiment === "Bearish") bear++;
    });
    document.getElementById("stat-total").textContent   = allRows.length;
    document.getElementById("stat-bullish").textContent = bull;
    document.getElementById("stat-bearish").textContent = bear;

  } catch (e) {
    document.getElementById("screener-body").innerHTML =
      '<tr><td colspan="11" class="error">Failed to load data.</td></tr>';
  }
}

function applyFilters() {
  const sym       = document.getElementById("filter-symbol").value.toUpperCase();
  const signal    = document.getElementById("filter-signal").value;
  const orderCol  = document.getElementById("filter-order").value;
  const sector    = document.getElementById("f-sector").value;
  const industry  = document.getElementById("f-industry").value;
  const country   = document.getElementById("f-country").value;
  const mktcap    = document.getElementById("f-mktcap").value;
  const price     = document.getElementById("f-price").value;
  const change    = document.getElementById("f-change").value;
  const avgvol    = document.getElementById("f-avgvol").value;
  const relvol    = document.getElementById("f-relvol").value;
  const peFilter  = document.getElementById("f-pe").value;
  const divYield  = document.getElementById("f-divyield").value;
  const shortFloat = document.getElementById("f-shortfloat").value;
  const rsiFilter = document.getElementById("f-rsi").value;
  const perfMonth = document.getElementById("f-perfmonth").value;
  const sentiment = document.getElementById("f-sentiment").value;
  const posts     = document.getElementById("f-posts").value;

  let filtered = allRows.filter(r => {
    const chg    = parseFloat(r.change) || 0;
    const pr     = parseFloat(r.price) || 0;
    const rv     = parseFloat(r.relative_volume) || 0;
    const av     = parseInt(String(r.average_volume || "0").replace(/,/g, "")) || 0;
    const mc     = parseMarketCapNum(r.market_cap);
    const pe     = parseFloat(r.p_e);
    const dy     = parsePercent(r.dividend_yield);
    const sf     = parsePercent(r.short_float);
    const rsi    = parseFloat(r.relative_strength_index_14);
    const perfM  = parsePercent(r.performance_month);
    const score  = r.sentiment_score;
    const pcount = socialCountMap[r.symbol] || 0;

    if (sym && !r.symbol.includes(sym)) return false;

    if (sector   && r.sector !== sector)     return false;
    if (industry && r.industry !== industry) return false;
    if (country  && r.country !== country)   return false;

    if (signal === "bullish" && r.sentiment !== "Bullish") return false;
    if (signal === "bearish" && r.sentiment !== "Bearish") return false;
    if (signal === "unusual" && rv < 2) return false;

    if (mktcap === "small"  && mc >= 2_000_000_000)  return false;
    if (mktcap === "mid"    && (mc < 2_000_000_000 || mc > 10_000_000_000)) return false;
    if (mktcap === "large"  && mc <= 10_000_000_000) return false;

    if (price && pr > parseFloat(price)) return false;

    if (change === "gainers" && chg <= 0)  return false;
    if (change === "losers"  && chg >= 0)  return false;
    if (change === "5"       && chg < 5)   return false;
    if (change === "10"      && chg < 10)  return false;
    if (change === "-5"      && chg > -5)  return false;
    if (change === "-10"     && chg > -10) return false;

    if (avgvol && av < parseInt(avgvol)) return false;
    if (relvol && rv < parseFloat(relvol)) return false;

    if (peFilter === "profitable"   && !(pe > 0))          return false;
    if (peFilter === "unprofitable" && !(isNaN(pe) || pe <= 0)) return false;
    if (peFilter === "low"          && !(pe > 0 && pe < 15))  return false;
    if (peFilter === "mid"          && !(pe >= 15 && pe <= 25)) return false;
    if (peFilter === "high"         && !(pe > 25))          return false;

    if (divYield === "none" && !(dy === null || dy === 0)) return false;
    if (divYield === "1"    && !(dy >= 1)) return false;
    if (divYield === "2"    && !(dy >= 2)) return false;
    if (divYield === "4"    && !(dy >= 4)) return false;

    if (shortFloat === "5"  && !(sf >= 5))  return false;
    if (shortFloat === "10" && !(sf >= 10)) return false;
    if (shortFloat === "20" && !(sf >= 20)) return false;

    if (rsiFilter === "overbought" && !(rsi > 70)) return false;
    if (rsiFilter === "oversold"   && !(rsi < 30)) return false;

    if (perfMonth === "up"   && !(perfM > 0))   return false;
    if (perfMonth === "down" && !(perfM < 0))   return false;
    if (perfMonth === "10"   && !(perfM >= 10)) return false;
    if (perfMonth === "-10"  && !(perfM <= -10)) return false;

    if (sentiment === "bullish"    && (score === null || score <= 0.05))  return false;
    if (sentiment === "bearish"    && (score === null || score >= -0.05)) return false;
    if (sentiment === "strongbull" && (score === null || score <= 0.09))  return false;
    if (sentiment === "strongbear" && (score === null || score >= -0.09)) return false;

    const scoreRange = document.getElementById("f-score-range").value;
    const scoreDir   = document.getElementById("f-score-dir").value;
    if (scoreRange === "strongbull" && (score === null || score <= 0.06))           return false;
    if (scoreRange === "bull"       && (score === null || score <= 0.02))           return false;
    if (scoreRange === "neutral"    && (score === null || score < -0.02 || score > 0.02)) return false;
    if (scoreRange === "bear"       && (score === null || score >= -0.02))          return false;
    if (scoreRange === "strongbear" && (score === null || score >= -0.06))          return false;
    if (scoreDir === "improving"    && (score === null || score <= 0))            return false;
    if (scoreDir === "declining"    && (score === null || score >= 0))            return false;

    if (posts && pcount < parseInt(posts)) return false;

    return true;
  });

  if (orderCol) {
    filtered = filtered.sort((a, b) => {
      const av = parseNum(a[orderCol]), bv = parseNum(b[orderCol]);
      if (!isNaN(av) && !isNaN(bv)) return (av - bv) * orderDir;
      return String(a[orderCol] || "").localeCompare(String(b[orderCol] || "")) * orderDir;
    });
  } else if (sortCol) {
    filtered = sortRows(filtered);
  }

  renderTable(filtered);
}

function parseNum(v) {
  return parseFloat(String(v || "").replace(/[%$BMKx,]/gi, "").trim());
}

function sortRows(rows) {
  return [...rows].sort((a, b) => {
    const av = parseNum(a[sortCol]), bv = parseNum(b[sortCol]);
    if (!isNaN(av) && !isNaN(bv)) return (av - bv) * sortDir;
    return String(a[sortCol] || "").localeCompare(String(b[sortCol] || "")) * sortDir;
  });
}

function formatScore(score) {
  if (score === null || score === undefined || isNaN(score)) return '<span class="score-neu">—</span>';
  const cls   = score > 0.1 ? "score-pos" : score < -0.1 ? "score-neg" : "score-neu";
  const sign  = score > 0 ? "+" : "";
  const pct   = Math.min(Math.abs(score) / 0.15, 1) * 100;
  const color = score > 0.1 ? "#3fb950" : score < -0.1 ? "#f85149" : "#8b949e";
  return `<div class="score-bar-wrap">
    <span class="${cls}">${sign}${score.toFixed(2)}</span>
    <div class="score-bar"><div class="score-bar-fill" style="width:${pct}%;background:${color};"></div></div>
  </div>`;
}

function renderTable(rows) {
  const body = document.getElementById("screener-body");
  if (!rows.length) {
    body.innerHTML = '<tr><td colspan="11" class="empty">No stocks match your filters.</td></tr>';
    return;
  }
  body.innerHTML = rows.map(r => {
    const chg      = parseFloat(r.change) || 0;
    const chgClass = chg > 0 ? "positive" : chg < 0 ? "negative" : "";
    const chgSign  = chg > 0 ? "+" : "";
    const sent     = r.sentiment || "None";
    const rv       = parseFloat(r.relative_volume) || 0;
    const sc       = r._sc || {};
    const scTip    = `Bullish: ${sc.bullish||0}  Bearish: ${sc.bearish||0}  Neutral: ${sc.none||0}`;
    const posts    = socialCountMap[r.symbol] || 0;
    const pe       = r.p_e ? r.p_e : "—";
    return `<tr>
      <td><a class="ticker-link" href="/charts?symbol=${r.symbol}"><strong>${r.symbol}</strong></a></td>
      <td>${r.sector || "—"}</td>
      <td>${r.industry || "—"}</td>
      <td>$${r.price || "—"}</td>
      <td class="${chgClass}">${chgSign}${chg.toFixed(2)}%</td>
      <td>${formatVolume(r.volume)}</td>
      <td>${rv > 0 ? rv.toFixed(2) + "x" : "—"}</td>
      <td>${formatMarketCap(r.market_cap)}</td>
      <td>${pe}</td>
      <td title="${scTip}">
        <span class="sent-badge sent-${sent.toLowerCase()}">${sent}</span>
        <span style="font-size:10px;color:var(--muted);margin-left:4px;">${posts} posts</span>
      </td>
      <td>${formatScore(r.sentiment_score)}</td>
    </tr>`;
  }).join("");
}

document.querySelectorAll("th.sortable").forEach(th => {
  th.addEventListener("click", () => {
    const col = th.dataset.col;
    if (sortCol === col) {
      sortDir *= -1;
    } else {
      document.querySelectorAll("th.sortable").forEach(t => t.classList.remove("sort-asc", "sort-desc"));
      sortCol = col;
      sortDir = 1;
    }
    th.className = "sortable " + (sortDir === 1 ? "sort-asc" : "sort-desc");
    applyFilters();
  });
});

document.getElementById("filter-symbol").addEventListener("input", applyFilters);
document.getElementById("filter-signal").addEventListener("change", applyFilters);
document.getElementById("filter-order").addEventListener("change", applyFilters);
document.getElementById("f-sector").addEventListener("change", applyFilters);
document.getElementById("f-industry").addEventListener("change", applyFilters);
document.getElementById("f-country").addEventListener("change", applyFilters);
document.getElementById("f-mktcap").addEventListener("change", applyFilters);
document.getElementById("f-price").addEventListener("change", applyFilters);
document.getElementById("f-change").addEventListener("change", applyFilters);
document.getElementById("f-avgvol").addEventListener("change", applyFilters);
document.getElementById("f-relvol").addEventListener("change", applyFilters);
document.getElementById("f-pe").addEventListener("change", applyFilters);
document.getElementById("f-divyield").addEventListener("change", applyFilters);
document.getElementById("f-shortfloat").addEventListener("change", applyFilters);
document.getElementById("f-rsi").addEventListener("change", applyFilters);
document.getElementById("f-perfmonth").addEventListener("change", applyFilters);
document.getElementById("f-sentiment").addEventListener("change", applyFilters);
document.getElementById("f-posts").addEventListener("change", applyFilters);
document.getElementById("f-score-range").addEventListener("change", applyFilters);
document.getElementById("f-score-dir").addEventListener("change", applyFilters);

window.registerPageLoader(loadScreener);
</script>

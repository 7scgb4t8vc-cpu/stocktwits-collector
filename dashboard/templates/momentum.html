{% extends "base.html" %}
{% block content %}

<div class="page-header">
  <h1>Momentum</h1>
  <p class="page-subtitle">Top movers ranked by relative volume</p>
</div>

<div class="filter-bar">
  <input type="text" id="filter-symbol" placeholder="Filter by symbol or sector" class="filter-input" />
  <button class="btn-refresh" onclick="loadMomentum()">↻ Refresh now</button>
</div>

<div class="stats-bar">
  <div class="stat-chip"><span id="stat-total">—</span> stocks</div>
  <div class="stat-chip positive"><span id="stat-gainers">—</span> gainers</div>
  <div class="stat-chip negative"><span id="stat-losers">—</span> losers</div>
  <div class="stat-chip"><span id="stat-updated">—</span></div>
</div>

<div class="momentum-grid" id="momentum-grid">
  <div class="loading">Loading...</div>
</div>

<style>
.score-pos { color: #7db83a; font-weight: 600; }
.score-neg { color: #e86a69; font-weight: 600; }
.score-neu { color: var(--muted); }
.momentum-card.is-gainer { border-top-color: var(--green); }
.momentum-card.is-loser  { border-top-color: var(--red); }
</style>

{% endblock %}

{% block scripts %}
<script>
let allMomentumRows = [];
let scoreMap = {};

async function loadMomentum() {
  try {
    const [momRes, scoreRes] = await Promise.all([
      fetch("/api/momentum"),
      fetch("/api/sentiment-scores"),
    ]);
    allMomentumRows = await momRes.json();
    scoreMap        = await scoreRes.json();

    let gainers = 0, losers = 0;
    allMomentumRows.forEach(r => {
      const chg = parseFloat(r.change_pct) || 0;
      if (chg > 0) gainers++;
      else if (chg < 0) losers++;
    });
    document.getElementById("stat-total").textContent   = allMomentumRows.length;
    document.getElementById("stat-gainers").textContent = gainers;
    document.getElementById("stat-losers").textContent  = losers;
    document.getElementById("stat-updated").textContent =
      "Updated " + new Date().toLocaleTimeString();

    renderMomentum(allMomentumRows);

  } catch (e) {
    document.getElementById("momentum-grid").innerHTML =
      '<div class="error">Failed to load data.</div>';
  }
}

function formatScore(score) {
  if (score === null || score === undefined || isNaN(score)) return '<span class="score-neu">—</span>';
  const cls = score > 0.1 ? "score-pos" : score < -0.1 ? "score-neg" : "score-neu";
  const sign = score > 0 ? "+" : "";
  return `<span class="${cls}">${sign}${score.toFixed(2)}</span>`;
}

function renderMomentum(rows) {
  const grid = document.getElementById("momentum-grid");

  if (!rows.length) {
    grid.innerHTML = '<div class="empty">No data available.</div>';
    return;
  }

  grid.innerHTML = rows.map(r => {
    const chg       = parseFloat(r.change_pct) || 0;
    const chgClass  = chg > 0 ? "positive" : chg < 0 ? "negative" : "";
    const cardClass = chg > 0 ? "is-gainer" : chg < 0 ? "is-loser" : "";
    const chgSign   = chg > 0 ? "+" : "";
    const relVol    = parseFloat(r.rel_volume) || 0;
    const rsi       = parseFloat(r.rsi) || 0;
    const rsiClass  = rsi >= 70 ? "rsi-hot" : rsi <= 30 ? "rsi-cold" : "rsi-neutral";
    const beta      = parseFloat(r.beta) || 0;

    const scoreRow = scoreMap[r.symbol];
    const score    = scoreRow ? parseFloat(scoreRow.sentiment_score) : null;

    return `
      <div class="momentum-card ${cardClass}">
        <div class="momentum-header">
         <a class="ticker-badge ticker-link" href="/charts?symbol=${r.symbol}">${r.symbol}</a>
          <span class="momentum-price">$${r.price || "—"}</span>
        </div>
        <div class="momentum-change ${chgClass}">${chgSign}${chg.toFixed(2)}%</div>
        <div class="momentum-stats">
          <div class="mstat">
            <span class="mstat-label">Rel Vol</span>
            <span class="mstat-value">${relVol.toFixed(2)}x</span>
          </div>
          <div class="mstat">
            <span class="mstat-label">Volume</span>
            <span class="mstat-value">${r.volume || "—"}</span>
          </div>
          <div class="mstat">
            <span class="mstat-label">RSI</span>
            <span class="mstat-value ${rsiClass}">${rsi.toFixed(1)}</span>
          </div>
          <div class="mstat">
            <span class="mstat-label">Beta</span>
            <span class="mstat-value">${beta.toFixed(2)}</span>
          </div>
          <div class="mstat">
            <span class="mstat-label">52W High</span>
            <span class="mstat-value">${r["52w_high"] || "—"}</span>
          </div>
          <div class="mstat">
            <span class="mstat-label">Mkt Cap</span>
            <span class="mstat-value">${r.market_cap || "—"}</span>
          </div>
          <div class="mstat">
            <span class="mstat-label">Sentiment</span>
            <span class="mstat-value">${formatScore(score)}</span>
          </div>
        </div>
        <div class="momentum-sector">${r.sector || "—"} · ${r.industry || "—"}</div>
      </div>`;
  }).join("");
}

function filterMomentum() {
  const sym = document.getElementById("filter-symbol").value.toUpperCase();
  const filtered = allMomentumRows.filter(r =>
    !sym ||
    r.symbol.includes(sym) ||
    (r.sector || "").toUpperCase().includes(sym) ||
    (r.industry || "").toUpperCase().includes(sym)
  );
  renderMomentum(filtered);
}

document.getElementById("filter-symbol").addEventListener("input", filterMomentum);

window.registerPageLoader(loadMomentum);
</script>
{% endblock %}

name: Daily OHLC History
on:
  schedule:
    - cron: "0 11 * * 1-5"   # once a day, 6am ET, Mon-Fri (before market opens)
  workflow_dispatch:
jobs:
  ohlc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install requests pymongo
      - name: Run OHLC fetcher
        env:
          FINVIZ_API_TOKEN: ${{ secrets.FINVIZ_API_TOKEN }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: python ohlc_fetcher.py

name: StockTwits Data Collector

on:
  schedule:
    - cron: "30 9-16 * * 1-5"  # every hour 9:30am-4:30pm ET, Mon-Fri
  workflow_dispatch:             # manual trigger anytime

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install collector dependencies
        run: pip install curl-cffi openpyxl requests beautifulsoup4 pytz yfinance

      - name: Run collector
        env:
          FINVIZ_API_TOKEN: ${{ secrets.FINVIZ_API_TOKEN }}
        run: python stocktwits_collector.py

      - name: Commit collector data to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: stocktwits data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

  nlp:
    needs: collect
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest (in case collect job pushed new data)
        run: git pull origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Hugging Face model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: finbert-model-cache

      - name: Install NLP dependencies
        run: pip install openpyxl transformers torch --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Run NLP processor (FinBERT, free, local)
        run: python nlp_processor.py

      - name: Commit NLP data to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: nlp sentiment $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

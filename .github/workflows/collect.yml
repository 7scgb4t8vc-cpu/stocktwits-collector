name: StockTwits Data Collector
on:
  schedule:
    - cron: "*/5 * * * *"    # main collector: every 5 min, 24/7
    - cron: "*/30 * * * *"   # finviz refresh: every 30 min, 24/7
  workflow_dispatch:             # manual trigger anytime
jobs:
  collect:
    if: github.event.schedule == '*/5 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install collector dependencies
        run: pip install curl-cffi requests pytz "pymongo[srv]" certifi
      - name: Run collector
        env:
          FINVIZ_API_TOKEN: ${{ secrets.FINVIZ_API_TOKEN }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: python -u stocktwits_collector.py

  finviz-refresh:
    if: github.event.schedule == '*/30 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install finviz dependencies
        run: pip install requests pytz "pymongo[srv]" certifi
      - name: Run FinViz refresh
        env:
          FINVIZ_API_TOKEN: ${{ secrets.FINVIZ_API_TOKEN }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: python -u finviz_refresh.py
  nlp:
    needs: collect
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache Hugging Face model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: finbert-model-cache
      - name: Install NLP dependencies
        run: pip install transformers torch pymongo --extra-index-url https://download.pytorch.org/whl/cpu
      - name: Run NLP processor (FinBERT, free, local)
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: python -u nlp_processor.py 2>&1

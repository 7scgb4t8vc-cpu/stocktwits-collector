name: StockTwits Data Collector

on:
  schedule:
    - cron: "30 9-16 * * 1-5"  # every hour 9:30am-4:30pm ET, Mon-Fri
  workflow_dispatch:             # manual trigger anytime

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install curl-cffi openpyxl requests beautifulsoup4 pytz

      - name: Run collector
        run: python stocktwits_collector.py

      - name: Upload data as artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: stocktwits-${{ github.run_id }}
          path: data/
          retention-days: 30

      - name: Commit data to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: stocktwits data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

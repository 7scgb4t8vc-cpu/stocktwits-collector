name: StockTwits Data Collector
on:
  schedule:
    - cron: "30 9-16 * * 1-5"  # every hour 9:30am-4:30pm ET, Mon-Fri
  workflow_dispatch:             # manual trigger anytime
jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install collector dependencies
        run: pip install curl-cffi requests pytz pymongo
      - name: Run collector
        env:
          FINVIZ_API_TOKEN: ${{ secrets.FINVIZ_API_TOKEN }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: python collector.py
  nlp:
    needs: collect
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache Hugging Face model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: finbert-model-cache
      - name: Install NLP dependencies
        run: pip install transformers torch pymongo --extra-index-url https://download.pytorch.org/whl/cpu
      - name: Run NLP processor (FinBERT, free, local)
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: python nlp_processor.py
